<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellyn Store</title>
<meta property="og:type" content="website">
<meta property="og:site_name" content="Cellyn Store">
<meta name="twitter:card" content="summary_large_image">
<!--SSR_META-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#141414;        /* Netflix black */
  --bg2:#1f1f1f;       /* panel */
  --bg3:#2a2a2a;       /* field / skeleton */
  --card:#181818;      /* card */
  --accent:#E50914;    /* Netflix red */
  --accent2:#f6121d;   /* red hover */
  --text:#ffffff;      /* white */
  --muted:#808080;     /* secondary gray */
  --border:#2f2f2f;    /* hairline */
  --radius:6px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:0}
::-webkit-scrollbar-thumb{background:#333;border-radius:99px}

/* ===== LOADING ===== */
.page-loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity 0.5s ease}
.page-loading.fade-out{opacity:0;pointer-events:none}
.loader-brand{font-size:26px;font-weight:900;letter-spacing:0.18em;color:var(--accent);text-transform:uppercase}
.loader-ring{width:42px;height:42px;border:3px solid #2a2a2a;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== NAVBAR ===== */
.navbar{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;gap:24px;padding:18px 4vw;transition:background 0.35s ease,padding 0.35s ease;background:linear-gradient(180deg,rgba(0,0,0,0.75) 0%,rgba(0,0,0,0) 100%)}
.navbar.scrolled{background:var(--bg);padding-top:12px;padding-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,0.6)}
.nav-brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.nav-logo{width:34px;height:34px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:#fff;overflow:hidden;flex-shrink:0}
.nav-logo img{width:100%;height:100%;object-fit:cover}
.nav-brand-name{font-size:20px;font-weight:800;color:var(--accent);letter-spacing:0.02em;white-space:nowrap}
.nav-links{display:flex;align-items:center;gap:20px;flex:1}
.nav-link{font-size:14px;font-weight:500;color:#e5e5e5;background:none;border:none;transition:color 0.15s}
.nav-link:hover{color:var(--muted)}
.nav-actions{display:flex;align-items:center;gap:16px;flex-shrink:0}
.nav-icon-btn{background:none;border:none;position:relative;display:flex;align-items:center;justify-content:center;padding:4px}
.nav-icon-btn svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s}
.nav-icon-btn:hover svg{stroke:var(--muted)}
.cart-badge{position:absolute;top:-6px;right:-8px;background:var(--accent);color:#fff;font-size:10px;font-weight:800;border-radius:99px;padding:1px 5px;min-width:16px;text-align:center;line-height:1.4;transition:transform 0.1s}
@keyframes badge-pop{0%{transform:scale(1)}40%{transform:scale(1.5)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
.cart-badge.pop{animation:badge-pop 0.35s cubic-bezier(0.36,0.07,0.19,0.97)}
.profile-wrap{position:relative}
.profile-avatar{width:30px;height:30px;border-radius:5px;background:linear-gradient(135deg,var(--accent),#7a0009);display:flex;align-items:center;justify-content:center;font-size:15px}
.profile-menu{position:absolute;top:44px;right:0;background:rgba(0,0,0,0.92);border:1px solid var(--border);border-radius:8px;padding:6px;min-width:180px;display:none;flex-direction:column;backdrop-filter:blur(8px)}
.profile-menu.open{display:flex}
.profile-menu button{background:none;border:none;color:#e5e5e5;text-align:left;padding:10px 12px;font-size:13px;border-radius:6px;display:flex;align-items:center;gap:8px;transition:background 0.15s}
.profile-menu button:hover{background:var(--bg3)}

/* ===== ANNOUNCEMENT ===== */
.announce{position:fixed;top:0;left:0;right:0;z-index:600;background:rgba(255,255,255,0.07);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.12);color:#fff;font-size:13px;font-weight:600;padding:0 44px 0 16px;display:none;overflow:hidden;height:40px;align-items:center;transform:translateY(-100%);transition:transform 0.4s ease}
body.has-announce{padding-top:40px}
body.has-announce .navbar{top:40px}
body.has-announce .cat-bar{top:96px}
.announce.show{display:flex;transform:translateY(0)}
.announce b{font-weight:800}
.announce-close{position:absolute;top:50%;right:12px;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;padding:4px;transition:color 0.15s}
.announce-close:hover{color:#fff}
.announce-inner{display:flex;align-items:center;gap:10px;width:100%;overflow:hidden}
.announce-icon{flex-shrink:0;display:flex;align-items:center;opacity:0.9}
.announce-icon svg{width:15px;height:15px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.announce-marquee{overflow:hidden;flex:1;mask-image:linear-gradient(90deg,transparent 0%,#000 5%,#000 95%,transparent 100%)}
.announce-track{display:inline-flex;gap:60px;white-space:nowrap;animation:marquee 10s linear infinite}
.announce-track:hover{animation-play-state:paused}
.announce-track span{white-space:nowrap}
@keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* ===== HERO ===== */
.hero{position:relative;height:88vh;min-height:560px;max-height:920px;width:100%;overflow:hidden;background:#000}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 0.8s ease;pointer-events:none}
.hero-slide.active{opacity:1;pointer-events:auto}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(30px) brightness(0.42);transform:scale(1.25)}
.hero-fg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:7vh 4vw 20vh}
.hero-fg img,.hero-fg video{max-width:100%;max-height:100%;object-fit:contain;border-radius:10px;box-shadow:0 24px 70px rgba(0,0,0,0.6)}
.hero-scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,20,20,0.9) 0%,rgba(20,20,20,0.35) 45%,transparent 78%)}
.hero-scrim2{position:absolute;inset:0;background:linear-gradient(0deg,var(--bg) 3%,rgba(20,20,20,0.55) 20%,transparent 52%)}
.hero-content{position:absolute;left:4vw;right:4vw;bottom:9%;max-width:640px;z-index:4}
.hero-badge{display:inline-block;font-size:12px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.hero-title{font-size:clamp(30px,5vw,60px);font-weight:900;line-height:1.05;letter-spacing:-0.02em;text-shadow:0 2px 12px rgba(0,0,0,0.7)}
.hero-sub{font-size:clamp(13px,1.6vw,18px);color:#e5e5e5;line-height:1.5;margin-top:14px;max-width:520px;text-shadow:0 1px 8px rgba(0,0,0,0.8);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-price{font-size:18px;font-weight:800;color:#fff;margin-top:12px}
.hero-price .strike{color:var(--muted);text-decoration:line-through;font-weight:500;font-size:14px;margin-right:8px}
.hero-btns{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}
.btn-hero{display:flex;align-items:center;gap:8px;border:none;border-radius:5px;padding:12px 26px;font-size:15px;font-weight:700;transition:transform 0.12s,opacity 0.15s}
.btn-hero:active{transform:scale(0.96)}
.btn-hero-play{background:#fff;color:#141414}
.btn-hero-play:hover{background:rgba(255,255,255,0.82)}
.btn-hero-info{background:rgba(109,109,110,0.55);color:#fff;backdrop-filter:blur(2px)}
.btn-hero-info:hover{background:rgba(109,109,110,0.4)}
.hero-dots{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:4;align-items:center}
.hero-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.25s;flex-shrink:0}
.hero-dot.active{background:var(--accent);width:20px;border-radius:99px}
.hero-dot.near{width:6px;height:6px;opacity:0.5}
.hero-dot.far{width:5px;height:5px;opacity:0.25}

/* ===== ROWS ===== */
.rows{position:relative;z-index:10;margin-top:0;padding-bottom:40px}
.row{margin:0 0 34px}
.row-head{display:flex;align-items:center;justify-content:space-between;padding:0 4vw;margin-bottom:12px}
.row-title{font-size:clamp(16px,2vw,22px);font-weight:800;color:#e5e5e5}
.row-count{font-size:12px;color:var(--muted);font-weight:600}
.row-viewport{position:relative}
.row-track{display:flex;gap:12px;overflow-x:auto;overflow-y:hidden;scroll-behavior:smooth;padding:14px 4vw 18px;scrollbar-width:none;-ms-overflow-style:none}
.row-track::-webkit-scrollbar{display:none}
.row-arrow{position:absolute;top:0;bottom:0;width:4vw;min-width:44px;background:rgba(20,20,20,0.55);border:none;color:#fff;font-size:26px;z-index:20;display:none;align-items:center;justify-content:center;transition:background 0.15s}
.row-arrow:hover{background:rgba(20,20,20,0.8)}
.row-arrow.left{left:0}
.row-arrow.right{right:0}
.row-viewport:hover .row-arrow.show{display:flex}

/* ===== CATEGORY BAR (chip, swipeable, sticky) ===== */
.cat-bar{position:fixed;top:56px;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid rgba(255,255,255,0.08);box-shadow:0 6px 18px rgba(0,0,0,0.45);transform:translateY(-135%);opacity:0;pointer-events:none;transition:transform 0.3s ease,opacity 0.3s ease}
.cat-bar.show{transform:translateY(0);opacity:1;pointer-events:auto}
.cat-chips{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:12px 4vw}
.cat-chips::-webkit-scrollbar{display:none}
.chip-cat{display:flex;align-items:center;gap:7px;flex-shrink:0;background:rgba(255,255,255,0.08);border:none;color:#e5e5e5;border-radius:99px;padding:8px 16px;font-size:13px;font-weight:600;white-space:nowrap;transition:background 0.15s,color 0.15s,transform 0.1s}
.chip-cat:hover{background:rgba(255,255,255,0.16)}
.chip-cat:active{transform:scale(0.95)}
.chip-cat.active{background:#fff;color:#141414}
.chip-ic{width:20px;height:20px;border-radius:50%;background:rgba(0,0,0,0.25);display:flex;align-items:center;justify-content:center;font-size:11px;overflow:hidden;flex-shrink:0}
.chip-ic img{width:100%;height:100%;object-fit:cover}
.chip-cat.active .chip-ic{background:rgba(0,0,0,0.1)}

/* ===== GRID (tampilan saat kategori difilter) ===== */
.grid-wrap{padding:24px 4vw 50px}
.grid-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:16px}
.grid-title{font-size:clamp(18px,2.4vw,26px);font-weight:800}
.grid-count{font-size:12px;color:var(--muted);font-weight:600;flex-shrink:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px}
.grid .card{width:auto}
.btn-more{background:var(--card);color:#fff;border:1px solid #333;border-radius:6px;padding:12px 24px;font-size:14px;font-weight:700;transition:background 0.15s}
.btn-more:hover{background:#252525}
.row-more{background:none;border:none;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;padding:0}
.row-more:hover{color:#fff}

/* ===== CARD ===== */
.card{position:relative;flex-shrink:0;width:250px;border-radius:var(--radius);overflow:hidden;background:var(--card);cursor:pointer;transition:transform 0.28s cubic-bezier(0.3,0,0.2,1),box-shadow 0.28s;will-change:transform;transform-origin:center center}
.row-track > .card:first-child{transform-origin:left center}
.row-track > .card:last-child{transform-origin:right center}
.card-media{position:relative;width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--bg3)}
.card-media img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s ease}
.card-media .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#232323,#161616)}
.card-tag{position:absolute;top:8px;left:0;z-index:3;font-size:9px;font-weight:800;letter-spacing:0.05em;text-transform:uppercase;padding:3px 12px 3px 8px;background:var(--accent);color:#fff;overflow:hidden;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 50%,calc(100% - 6px) 100%,0 100%);box-shadow:2px 2px 8px rgba(229,9,20,0.4)}
.card-tag::after{content:'';position:absolute;top:0;left:-75%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);animation:badge-shine 2.5s infinite}
@keyframes badge-shine{0%{left:-75%}100%{left:150%}}
.card-tag.gray{background:rgba(0,0,0,0.75);color:#e5e5e5;box-shadow:none}
.card-tag.gray::after{display:none}
.card-info{padding:10px 12px 12px;background:var(--card)}
.card-cat{font-size:9px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.card-name{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.card-price{font-size:14px;font-weight:800;color:#fff}
.card-price .strike{font-size:10px;color:var(--muted);text-decoration:line-through;font-weight:500;margin-right:5px}
.card-stock{font-size:10px;font-weight:600}
.card-buy{background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.18);color:#fff;border-radius:99px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform 0.12s,background 0.15s,box-shadow 0.15s}
.card-buy:hover{background:rgba(255,255,255,0.22);box-shadow:0 0 10px rgba(255,255,255,0.15)}
.card-buy:active{transform:scale(0.85)}
.card-buy:disabled{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.08);color:var(--muted);cursor:not-allowed}
@keyframes buy-pop{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
.card-buy.pop{animation:buy-pop 0.3s cubic-bezier(0.36,0.07,0.19,0.97)}
@media(min-width:1024px){.hero{height:56.25vw;max-height:85vh;min-height:400px}.hero-fg{padding:0}.hero-fg img,.hero-fg video{width:100%;height:100%;object-fit:cover;border-radius:0;box-shadow:none}}
@media(hover:hover){
  .card:hover{transform:scale(1.06);box-shadow:0 14px 34px rgba(0,0,0,0.7),0 0 0 1.5px rgba(229,9,20,0.5),0 0 18px rgba(229,9,20,0.25);z-index:15}
  .card:hover .card-media img{transform:scale(1.06)}
  .grid .card:hover{transform:scale(1.03);box-shadow:0 8px 24px rgba(0,0,0,0.6),0 0 0 1.5px rgba(229,9,20,0.5),0 0 14px rgba(229,9,20,0.2)}
}

/* ===== SKELETON ===== */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.shine{background:linear-gradient(90deg,#1a1a1a 25%,#262626 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
.skel-hero{height:min(66vh,540px);margin-bottom:24px}
.skel-row{margin:0 0 34px}
.skel-head{padding:0 4vw;margin-bottom:14px}
.skel-title{width:180px;max-width:45vw;height:20px;border-radius:6px}
.skel-track{display:flex;gap:12px;overflow:hidden;padding:0 4vw}
.skel-card{flex-shrink:0;width:250px;max-width:60vw}
.skel-card .m{width:100%;aspect-ratio:16/9;border-radius:var(--radius)}
.skel-card .l{height:12px;margin-top:9px;border-radius:5px}

/* ===== FOOTER ===== */
.footer{border-top:1px solid rgba(255,255,255,0.06);padding:44px 4vw 60px;background:linear-gradient(180deg,#0d0d0d 0%,#080808 100%);position:relative}
.footer::before{content:'';position:absolute;top:0;left:4vw;right:4vw;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent)}
.footer-cols{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:30px;margin-bottom:26px}
.footer-col-title{font-size:12px;font-weight:800;color:#fff;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.05em}
.footer-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.footer-logo{width:30px;height:30px;border-radius:6px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden}
.footer-logo img{width:100%;height:100%;object-fit:cover}
.footer-name{font-size:16px;font-weight:800;color:var(--accent)}
.footer-links{display:flex;flex-direction:column;gap:11px}
.footer-links button{background:none;border:none;color:var(--muted);font-size:13px;text-align:left;transition:color 0.15s,transform 0.15s;padding:0}
.footer-links button:hover{color:#fff;transform:translateX(4px)}
.footer-contact{display:flex;flex-direction:column;gap:11px;margin-top:6px}
.footer-contact .fc-item{display:flex;align-items:center;gap:9px;color:#a3a3a3;font-size:13px;text-decoration:none}
.footer-contact a.fc-item:hover{color:#fff}
.footer-contact svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.fc-social{display:flex;gap:14px;margin-top:4px}
.fc-social a{color:#a3a3a3;display:inline-flex;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;transition:all 0.15s}
.fc-social a:hover{color:#fff;background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.2);transform:translateY(-2px)}
.fc-social svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.footer-pages{display:flex;flex-direction:column;gap:11px}
.footer-pages a{color:var(--muted);font-size:13px;text-decoration:none;transition:color 0.15s,transform 0.15s;display:inline-block}
.footer-pages a:hover{color:#fff;transform:translateX(4px)}
.footer-copy{font-size:12px;color:#5a5a5a;line-height:1.7;border-top:1px solid rgba(255,255,255,0.06);padding-top:20px;position:relative}
.footer-copy::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent)}
@media(max-width:720px){.footer-cols{grid-template-columns:1fr 1fr;gap:26px}}
@media(max-width:460px){.footer-cols{grid-template-columns:1fr}}

/* ===== OVERLAY / MODAL ===== */
.search-modal{background:rgba(20,20,20,0.25)!important;backdrop-filter:blur(24px)!important;-webkit-backdrop-filter:blur(24px)!important;border:1px solid rgba(255,255,255,0.08)!important}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:800;display:none;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;transition:background 0.3s ease}
.overlay.active{display:flex;background:rgba(0,0,0,0.8)}
.modal{background:rgba(20,20,20,0.45);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,0.07);border-radius:10px;width:100%;max-width:860px;overflow:hidden;transform:translateY(24px) scale(0.98);opacity:0;transition:transform 0.35s cubic-bezier(0.34,1.3,0.64,1),opacity 0.3s;margin:auto}
.overlay.active .modal{transform:translateY(0) scale(1);opacity:1}
.modal-hero{position:relative;width:100%;aspect-ratio:16/9;max-height:420px;background:var(--bg3);overflow:hidden}
.modal-hero img,.modal-hero video{width:100%;height:100%;object-fit:cover}
.modal-hero-scrim{position:absolute;inset:0;background:linear-gradient(0deg,rgba(10,10,10,0.98) 2%,rgba(10,10,10,0.4) 40%,transparent 65%)}
.variant-desc{font-size:13px;color:#c9c9c9;line-height:1.6;margin:10px 0 4px;padding:12px 14px;background:var(--card);border-left:3px solid var(--accent);border-radius:8px}
.modal-close{position:absolute;top:14px;right:14px;z-index:5;background:rgba(20,20,20,0.75);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;transition:background 0.15s}
.modal-close:hover{background:var(--accent)}
.modal-title-abs{position:absolute;left:28px;bottom:20px;right:28px;z-index:4}
.modal-title-abs h2{font-size:clamp(22px,3vw,34px);font-weight:900;line-height:1.1;text-shadow:0 2px 12px rgba(0,0,0,0.8)}
.modal-body{padding:20px 28px 32px}
.modal-meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:14px}
.chip{font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px;background:var(--bg3);color:#e5e5e5}
.chip.green{color:#46d369}
.chip.red{color:#ff6b6b}
.chip.gold{color:#f6c453}
.modal-price{font-size:26px;font-weight:900;color:#fff}
.modal-price .strike{font-size:15px;color:var(--muted);text-decoration:line-through;font-weight:500;margin-right:10px}
.modal-price .disc{font-size:13px;color:#46d369;font-weight:800;margin-left:8px}
.modal-desc{font-size:14px;color:#d2d2d2;line-height:1.7;margin:14px 0}
.qty-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;padding:11px 14px;background:var(--card);border-radius:8px}
.qty-row .lbl{font-size:14px;font-weight:700;color:#fff}
.qty-stepper{display:flex;align-items:center;background:var(--bg3);border-radius:8px;overflow:hidden}
.qty-stepper button{width:40px;height:40px;background:transparent;border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background 0.15s}
.qty-stepper button:hover:not(:disabled){background:rgba(255,255,255,0.1)}
.qty-stepper button:disabled{opacity:0.35;cursor:not-allowed}
.qty-stepper .qv{min-width:44px;text-align:center;font-size:16px;font-weight:800;color:#fff}
.qty-stepper svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.btn{border:none;border-radius:5px;padding:14px;font-size:15px;font-weight:700;transition:transform 0.1s,opacity 0.15s,background 0.15s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn svg,.btn-hero svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-wa{background:#25d366;color:#fff}
.btn-wa:hover{opacity:0.9}
.btn-ghost{background:var(--bg3);color:#fff}
.btn-ghost:hover{background:#3a3a3a}
.btn-block{width:100%;margin-top:10px}

/* variants */
.variant-list{display:flex;flex-direction:column;gap:8px;margin:6px 0 4px}
.variant-opt{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);cursor:pointer;transition:all 0.15s}
.variant-opt.selected{border-color:var(--accent);background:rgba(229,9,20,0.12)}
.variant-opt .vn{font-size:13px;font-weight:700}
.variant-opt .vs{font-size:11px;color:var(--muted);margin-top:2px}
.variant-opt .vp{font-size:14px;font-weight:800;color:#fff;text-align:right}
.section-label{font-size:12px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px}

/* related */
.related-grid{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.related-grid::-webkit-scrollbar{display:none}
.related-card{flex-shrink:0;width:150px;background:var(--card);border-radius:6px;overflow:hidden;cursor:pointer;transition:transform 0.15s}
.related-card:hover{transform:scale(1.04)}
.related-card img{width:100%;aspect-ratio:16/9;object-fit:cover;background:var(--bg3)}
.related-card .rb{padding:8px 10px}
.related-card .rn{font-size:12px;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;line-height:1.3}
.related-card .rp{font-size:12px;font-weight:800;color:var(--accent)}

/* reviews */
.review-avg{display:flex;align-items:center;gap:8px}
.review-avg .score{font-size:26px;font-weight:900}
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-name{font-size:13px;font-weight:700}
.review-stars{display:inline-flex;gap:2px;margin:3px 0}
.review-comment{font-size:13px;color:#c9c9c9;line-height:1.5}
.review-date{font-size:11px;color:#5a5a5a;margin-top:4px}
.review-form{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:14px}
.star-picker{display:flex;gap:6px;margin-bottom:12px}
.star-btn{background:none;border:none;padding:0;cursor:pointer;color:#555;transition:color 0.12s,transform 0.1s}
.star-btn.active{color:#f6c453}
.star-btn svg{width:28px;height:28px;fill:currentColor;display:block}
.star-btn:active{transform:scale(1.2)}
.star{width:14px;height:14px;vertical-align:middle}
.star-on{fill:#f6c453}
.star-off{fill:none;stroke:#5a5a5a;stroke-width:1.6}
.ic-x{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;display:inline-block;vertical-align:middle}
.input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:#fff;outline:none;font-family:inherit;margin-bottom:10px;transition:border-color 0.15s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:#6b6b6b}
textarea.input{resize:vertical;min-height:70px}

/* ===== CART DRAWER ===== */
.drawer{position:fixed;top:0;right:0;bottom:0;width:min(420px,92vw);background:var(--bg2);z-index:900;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.3,0,0.2,1);display:flex;flex-direction:column;box-shadow:-8px 0 40px rgba(0,0,0,0.6)}
.drawer.open{transform:translateX(0)}
.drawer-scrim{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:850;display:none;transition:background 0.3s}
.drawer-scrim.open{display:block;background:rgba(0,0,0,0.6)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:20px;border-bottom:1px solid var(--border)}
.drawer-head h3{font-size:18px;font-weight:800}
.drawer-body{flex:1;overflow-y:auto;padding:16px 20px}
.drawer-foot{padding:16px 20px;border-top:1px solid var(--border);background:var(--bg2)}
.cart-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:64px;height:40px;border-radius:5px;object-fit:cover;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:700;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-price{font-size:12px;color:var(--accent);font-weight:700}
.qty-ctrl{display:flex;align-items:center;gap:8px;flex-shrink:0}
.qty-btn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.qty-btn:active{transform:scale(0.85);background:var(--accent);border-color:var(--accent)}
.qty-num{font-size:13px;font-weight:800;min-width:18px;text-align:center}
.cart-empty{text-align:center;padding:60px 0;color:var(--muted)}
.cart-empty .ic{font-size:44px;margin-bottom:12px}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--muted)}
.sum-total{font-size:17px;font-weight:900;color:#fff}
.qris-wrap{text-align:center;margin:14px 0;padding:14px;background:var(--card);border-radius:10px}
.qris-wrap .lbl{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600}
.qris-img{width:170px;height:170px;object-fit:contain;margin:0 auto;border-radius:8px;background:#fff;padding:8px}
.wa-preview{background:var(--card);border-radius:8px;padding:10px 12px;font-size:11px;color:var(--muted);white-space:pre-wrap;margin:10px 0;max-height:110px;overflow-y:auto;line-height:1.5;display:none;border:1px solid var(--border)}

/* ===== SEARCH RESULT ITEM ===== */
.result-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer}
.result-item:hover{opacity:0.85}
.result-img{width:70px;height:44px;border-radius:5px;object-fit:cover;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.hist-tags{display:flex;flex-wrap:wrap;gap:8px}
.hist-tag{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:6px 14px;font-size:12px;cursor:pointer;transition:border-color 0.15s}
.hist-tag:hover{border-color:var(--accent)}

/* ===== FLASH ===== */
.flash{position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:1200;padding:12px 18px;background:#fff;color:#141414;border-radius:8px;font-size:13px;font-weight:700;display:none;align-items:center;gap:10px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,0.5)}
.flash.show{display:flex;animation:flashIn 0.3s ease}
.flash-ic{display:flex;flex-shrink:0}
.flash-ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.6;stroke-linecap:round;stroke-linejoin:round}
.flash-ok .flash-ic{color:#1db954}
.flash-err .flash-ic{color:var(--accent)}
.flash-info .flash-ic{color:#666}
@keyframes flashIn{from{transform:translateX(-50%) translateY(12px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}

/* ===== SCROLL TOP ===== */
.scroll-top{position:fixed;bottom:28px;right:28px;width:46px;height:46px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:20px;z-index:400;display:none;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(229,9,20,0.5);transition:transform 0.2s}
.scroll-top.show{display:flex}
.scroll-top:active{transform:scale(0.88)}

.empty-state{text-align:center;padding:80px 16px;color:var(--muted);display:flex;flex-direction:column;align-items:center}

/* ===== MOBILE BOTTOM NAV (ala app Netflix) ===== */
.bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:450;background:rgba(255,255,255,0.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,0.1);padding:6px 0 calc(6px + env(safe-area-inset-bottom,0px));justify-content:space-around;align-items:center}
.bn-item{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;position:relative;flex:1;transition:transform 0.12s}
.bn-item:active{transform:scale(0.9)}
.bn-item svg{width:22px;height:22px;stroke:#b3b3b3;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s}
.bn-item span{font-size:10px;font-weight:600;color:#b3b3b3;transition:color 0.15s}
.bn-item.active svg{stroke:var(--accent)}
.bn-item.active span{color:var(--accent)}
.bn-badge{position:absolute;top:-1px;right:calc(50% - 22px);background:var(--accent);color:#fff;font-size:9px;font-weight:800;border-radius:99px;padding:1px 5px;min-width:15px;text-align:center;line-height:1.45}

@media(max-width:600px){
  .navbar{gap:12px;padding:14px 16px}
  .nav-brand-name{font-size:17px}
  .nav-links{display:none}
  .nav-link{font-size:13px}
  .hero{height:72vh;min-height:440px}
  .hero-content{bottom:12%;right:16px}
  .card{width:148px}
  .row-track{padding:16px 4vw}
  .row{margin-bottom:22px}
  .modal-btns{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .cat-chips{padding:10px 4vw}
  .chip-cat{padding:7px 13px;font-size:12px}
  .cat-bar{top:54px}
  body.has-announce .cat-bar{top:94px}
  .bottom-nav{display:flex}
  body{padding-bottom:60px}
  .footer{padding-bottom:80px}
  .scroll-top{bottom:76px;right:16px;width:42px;height:42px}
}
</style>
</head>

<!-- FAILSAFE: overlay loading tidak boleh nyangkut selamanya (jaringan lambat / browser lama).
     Blok skrip terpisah & sintaks ES5 agar tetap jalan walau skrip utama gagal di-parse. -->
<script>
(function(){
  function reveal(){
    var l=document.getElementById('pageLoading');
    if(l){ l.style.transition='opacity .4s ease'; l.style.opacity='0';
      setTimeout(function(){ if(l){ l.style.display='none'; } }, 450); }
    var rows=document.getElementById('rows');
    if(rows && !window.__storeLoaded){
      rows.innerHTML='<div style="text-align:center;padding:80px 16px;color:#808080">'
        +'<div style="font-size:17px;color:#fff;font-weight:700">Gagal memuat toko</div>'
        +'<div style="font-size:13px;margin-top:8px">Periksa koneksi internet lalu coba lagi.</div>'
        +'<button onclick="location.reload()" style="margin-top:18px;background:#E50914;color:#fff;border:none;border-radius:6px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer">Muat Ulang</button>'
        +'</div>';
    }
  }
  setTimeout(reveal, 15000);
})();
</script>

<script>
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function rupiah(n){return 'Rp'+new Intl.NumberFormat('id-ID').format(Number(n||0));}
function slugify(t){return String(t||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');}
function productUrl(p){return '/produk/'+p.id+'-'+(p.slug||slugify(p.name));}
function flash(msg,type){
  const el=$('#flash');
  const ic={ok:'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',err:'<svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',info:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'};
  const t=ic[type]?type:'info';
  el.className='flash flash-'+t;
  el.innerHTML=`<span class="flash-ic">${ic[t]}</span><span>${esc(msg)}</span>`;
  el.classList.add('show');clearTimeout(window._ft);window._ft=setTimeout(()=>el.classList.remove('show'),2400);
}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}
async function api(url,opt={}){
  const options={credentials:'include',...opt};
  if(opt.body&&!(opt.body instanceof FormData))options.headers={...(opt.headers||{}),'Content-Type':'application/json'};
  let timer;
  if(typeof AbortController!=='undefined'){
    const ctrl=new AbortController();
    options.signal=ctrl.signal;
    timer=setTimeout(function(){try{ctrl.abort();}catch(e){}},12000);
  }
  try{
    const res=await fetch(url,options);
    const text=await res.text();
    const data=text?JSON.parse(text):{};
    if(!res.ok)throw new Error(data.error||'Request gagal');
    return data;
  }finally{ if(timer)clearTimeout(timer); }
}

const IC={

  info:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>',

};

  storefront:'<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round"><path d="M3 9l1.5-5h15L21 9"/><path d="M4 9v10a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1V9"/><path d="M3.5 9a2.5 2.5 0 0 0 5 0 2.5 2.5 0 0 0 5 0 2.5 2.5 0 0 0 5 0"/></svg>',
  inbox:'<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round"><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>',
  warn:'<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
  clock:'<svg viewBox="0 0 24 24" style="width:1em;height:1em;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;vertical-align:-0.15em;margin-right:5px"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>',

  home:'<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>'
});
const STAR='<svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
function stars(n){n=Math.max(0,Math.min(5,Number(n)||0));var o='';for(var i=1;i<=5;i++){o+='<svg class="star '+(i<=n?'star-on':'star-off')+'" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';}return o;}
const state={products:[],categories:[],config:{},cart:[],banners:[],heroSlides:[],heroIdx:0,heroTimer:null,currentCat:'all'};

/* ============ CART ============ */
function cartKey(id,variantId){return variantId?(id+':'+variantId):('p'+id);}
function saveCart(){try{localStorage.setItem('cellyn_cart',JSON.stringify(state.cart));}catch(e){}}
function loadCart(){
  try{state.cart=JSON.parse(localStorage.getItem('cellyn_cart')||'[]');}catch(e){state.cart=[];}
  state.cart.forEach(it=>{if(!it.key)it.key=cartKey(it.id,it.variantId);});
}
function cartCount(){return state.cart.reduce((a,b)=>a+b.qty,0);}
function cartTotal(){return state.cart.reduce((a,b)=>a+(b.price*b.qty),0);}
function updateCartUI(){
  const c=cartCount();
  ['#cartBadge','#cartNavBadge'].forEach(sel=>{
    const b=$(sel);if(!b)return;
    const prev=parseInt(b.textContent)||0;
    b.textContent=c;b.style.display=c>0?(sel==='#cartNavBadge'?'block':'inline'):'none';
    if(c>prev){b.classList.remove('pop');void b.offsetWidth;b.classList.add('pop');setTimeout(()=>b.classList.remove('pop'),400);}
  });
}
function addToCart(p){
  if(Number(p.stock||0)<1)return flash('Stok habis','err');
  const key=cartKey(p.id,null);
  const found=state.cart.find(x=>x.key===key);
  if(found){if(found.qty+1>Number(p.stock||0))return flash('Melebihi stok','err');found.qty++;}
  else state.cart.push({key,id:p.id,name:p.name,price:Number(p.price||0),qty:1,image:p.thumbnail||p.image,stock:Number(p.stock||0)});
  saveCart();updateCartUI();
  flash(p.name+' ditambahkan','ok');
}
window.addCartById=id=>{const p=state.products.find(x=>x.id===id);if(p)addToCart(p);};
window.updateQty=(key,delta)=>{
  const item=state.cart.find(x=>x.key===key);if(!item)return;
  if(delta>0&&item.qty+1>Number(item.stock||0))return flash('Melebihi stok','err');
  item.qty+=delta;
  if(item.qty<=0)state.cart=state.cart.filter(x=>x.key!==key);
  saveCart();renderCartItems();updateCartUI();
};
function renderCartItems(){
  const el=$('#cartItems'),foot=$('#cartFoot'),waEl=$('#waPreview'),waBtn=$('#checkoutWaBtn');
  if(!state.cart.length){
    el.innerHTML='<div class="cart-empty"><div style="width:64px;height:64px;background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${IC.cartLg}</div><div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px">Keranjang kosong</div><div style="font-size:12px;color:var(--muted)">Yuk pilih produk dulu</div></div>';
    foot.style.display='none';return;
  }
  foot.style.display='block';
  el.innerHTML=state.cart.map(i=>`
    <div class="cart-item">
      ${i.image?`<img class="cart-item-img" src="${esc(i.image)}" alt="${esc(i.name)}">`:`<div class="cart-item-img">${IC.box}</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(i.name)}</div>
        <div class="cart-item-price">${rupiah(i.price)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="updateQty('${i.key}',-1)">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="updateQty('${i.key}',1)">+</button>
      </div>
    </div>`).join('');
  $('#sumItems').textContent=cartCount()+' item';
  $('#sumTotal').textContent=rupiah(cartTotal());
  if(state.config.qrisImagePath){$('#qrisWrap').style.display='block';$('#qrisImg').src=state.config.qrisImagePath;}
  waBtn.disabled=false;
  api('/api/build-whatsapp-link',{method:'POST',body:JSON.stringify({items:state.cart})}).then(r=>{
    waEl.textContent=r.message;waEl.style.display='block';window._waLink=r.waLink;
  }).catch(()=>{});
}
window.openCart=()=>{$('#cartDrawer').classList.add('open');$('#cartScrim').classList.add('open');renderCartItems();};
window.closeCart=()=>{$('#cartDrawer').classList.remove('open');$('#cartScrim').classList.remove('open');};
$('#clearCartBtn').onclick=()=>{state.cart=[];saveCart();renderCartItems();updateCartUI();};
$('#checkoutWaBtn').onclick=()=>{
  if(!state.cart.length)return flash('Keranjang kosong');
  if(window._waLink){
    api('/api/track-order',{method:'POST',body:JSON.stringify({items:state.cart})}).catch(()=>{});
    const w=window.open(window._waLink,'_blank','noopener');if(!w)flash('Izinkan popup di browser');
  }else flash('Menyiapkan link WA...');
};

/* ============ HELPERS ============ */
function getProductDisplay(p){
  const variants=p.variants||[];
  if(!variants.length)return{price:Number(p.price||0),orig:Number(p.original_price||0),stock:Number(p.stock||0),priceLabel:rupiah(p.price),hasVariants:false};
  const allPrices=variants.map(v=>Number(v.price||0));
  const minPrice=Math.min(...allPrices),maxPrice=Math.max(...allPrices);
  const totalStock=variants.reduce((a,v)=>a+Number(v.stock||0),0);
  return{price:minPrice,orig:0,stock:totalStock,priceLabel:minPrice===maxPrice?rupiah(minPrice):'Mulai '+rupiah(minPrice),hasVariants:true,variantCount:variants.length};
}
function badgeFor(p){
  const orig=Number(p.original_price||0),price=Number(p.price);
  const hasDisc=orig>0&&orig>price;
  const disc=hasDisc?Math.round((1-price/orig)*100):0;
  const b=(p.badge||'').toLowerCase();
  if(hasDisc)return{cls:'',txt:`PROMO -${disc}%`};
  if(b.includes('promo'))return{cls:'',txt:'PROMO'};
  if(b.includes('hot')||b.includes('terlaris'))return{cls:'',txt:'TERLARIS'};
  if(b.includes('new')||b.includes('baru'))return{cls:'gray',txt:'BARU'};
  if(b.includes('best'))return{cls:'gray',txt:'BEST'};
  if(p.badge)return{cls:'gray',txt:p.badge};
  return null;
}
function stockLabel(stock){
  if(stock<=0)return'<span class="card-stock" style="color:#ff6b6b">Habis</span>';
  if(stock<=3)return'<span class="card-stock" style="color:#f6c453">Tipis</span>';
  return'<span class="card-stock" style="color:#46d369">● Ready</span>';
}

/* ============ CARD ============ */
function cardHtml(p){
  const disp=getProductDisplay(p);
  const bg=badgeFor(p);
  const img=p.thumbnail||p.image;
  const hasDisc=disp.orig>0&&disp.orig>disp.price;
  return`<div class="card" onclick="openDetail(${p.id})">
    <div class="card-media">
      ${img?`<img src="${esc(img)}" alt="${esc(p.name)}" loading="lazy">`:`<div class="ph">${IC.box}</div>`}
      ${bg?`<span class="card-tag ${bg.cls}">${esc(bg.txt)}</span>`:''}
    </div>
    <div class="card-info">
      <div class="card-cat">${esc(p.category_name||'Digital')}</div>
      <div class="card-name">${esc(p.name)}</div>
      <div class="card-row">
        <div class="card-price">${hasDisc?`<span class="strike">${rupiah(disp.orig)}</span>`:''}${disp.priceLabel}</div>
        <button class="card-buy" onclick="event.stopPropagation();this.classList.remove('pop');void this.offsetWidth;this.classList.add('pop');${disp.hasVariants?`openDetail(${p.id})`:`addCartById(${p.id})`}" ${disp.stock<=0?'disabled':''} title="${disp.hasVariants?'Pilih varian':'Tambah ke keranjang'}"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      </div>
      <div style="margin-top:5px">${stockLabel(disp.stock)}${disp.hasVariants?` <span class="card-stock" style="color:var(--muted)">· ${disp.variantCount} varian</span>`:''}</div>
    </div>
  </div>`;
}

/* ============ ROWS ============ */
function buildRows(){
  const rowsEl=$('#rows');
  const rowDefs=[];

  // Terlaris / populer
  const popular=[...state.products].filter(p=>Number(p.sold_count||0)>0||Number(p.view_count||0)>0)
    .sort((a,b)=>(Number(b.sold_count||0)+Number(b.view_count||0))-(Number(a.sold_count||0)+Number(a.view_count||0))).slice(0,14);
  if(popular.length>=2)rowDefs.push({title:'Paling Populer',items:popular});

  // Promo
  const promo=state.products.filter(p=>{
    const hasDisc=Number(p.original_price||0)>Number(p.price||0);
    const b=(p.badge||'').toLowerCase();
    return hasDisc||b.includes('promo')||b.includes('hot');
  }).slice(0,14);
  if(promo.length>=2)rowDefs.push({title:'Promo & Diskon',items:promo});

  // Terbaru
  const newest=[...state.products].sort((a,b)=>b.id-a.id).slice(0,14);
  if(newest.length>=2)rowDefs.push({title:'Baru Ditambahkan',items:newest});

  // Per kategori (batasi 16 per baris; sisanya via "Lihat semua" -> grid paginated)
  const ROW_CAP=16;
  state.categories.forEach(c=>{
    const all=state.products.filter(p=>String(p.category_id)===String(c.id));
    if(all.length)rowDefs.push({title:c.name,items:all.slice(0,ROW_CAP),total:all.length,catId:c.id});
  });

  // Semua produk (fallback bila belum ada kategori)
  if(!state.categories.length&&state.products.length){
    rowDefs.push({title:'Semua Produk',items:state.products.slice(0,ROW_CAP),total:state.products.length});
  }

  if(!state.products.length){
    rowsEl.innerHTML=`<div class="empty-state"><div style="font-size:48px;margin-bottom:14px">${IC.storefront}</div><div style="font-size:16px;font-weight:700;color:#fff">Belum ada produk</div><div style="font-size:13px;margin-top:6px">Tambahkan produk lewat panel admin</div></div>`;
    return;
  }

  rowsEl.innerHTML=rowDefs.map((r,ri)=>`
    <section class="row">
      <div class="row-head"><span class="row-title">${esc(r.title)}</span>${(r.catId&&r.total>r.items.length)?`<button class="row-more" onclick="selectCategory('${esc(String(r.catId)).replace(/'/g,"\\'")}')">Lihat semua (${r.total})</button>`:`<span class="row-count">${r.total||r.items.length} item</span>`}</div>
      <div class="row-viewport">
        <button class="row-arrow left ${r.items.length>3?'show':''}" onclick="scrollRow(${ri},-1)">‹</button>
        <div class="row-track" id="rowTrack-${ri}">${r.items.map(cardHtml).join('')}</div>
        <button class="row-arrow right ${r.items.length>3?'show':''}" onclick="scrollRow(${ri},1)">›</button>
      </div>
    </section>`).join('');
}
window.scrollRow=(ri,dir)=>{
  const track=$('#rowTrack-'+ri);if(!track)return;
  track.scrollBy({left:dir*Math.max(track.clientWidth*0.8,300),behavior:'smooth'});
};

/* ============ CATEGORY CHIPS + FILTER ============ */
function buildChips(){
  const bar=$('#catBar'),el=$('#catChips');
  if(!state.categories.length){bar.style.display='none';return;}
  const cats=[{id:'all',name:'Semua',icon_url:''},...state.categories];
  el.innerHTML=cats.map(c=>`
    <button class="chip-cat${String(state.currentCat)===String(c.id)?' active':''}" data-cat="${esc(String(c.id))}" onclick="selectCategory('${esc(String(c.id)).replace(/'/g,"\\'")}')">
      <span class="chip-ic">${c.icon_url?`<img src="${esc(c.icon_url)}" alt="">`:(c.id==='all'?IC.home:esc(String(c.name).charAt(0).toUpperCase()))}</span>
      ${esc(c.name)}
    </button>`).join('');
  bar.style.display='block';
}
window.selectCategory=catId=>{
  state.currentCat=catId;
  $$('#catChips .chip-cat').forEach(b=>b.classList.toggle('active',String(b.dataset.cat)===String(catId)));
  buildHero(catId);
  renderView(catId);
  updateCatBar();
  // Naik ke atas supaya hero kategori yang baru langsung terlihat
  window.scrollTo({top:0,behavior:'smooth'});
};
function renderView(catId){
  if(catId==='all'){buildRows();return;}
  renderGrid(catId);
}
let gridState={items:[],shown:0,batch:24};
let gridObserver=null;
function renderGrid(catId){
  const cat=state.categories.find(c=>String(c.id)===String(catId));
  const items=state.products.filter(p=>String(p.category_id)===String(catId));
  const rowsEl=$('#rows');
  if(gridObserver){gridObserver.disconnect();gridObserver=null;}
  if(!items.length){
    rowsEl.innerHTML=`<div class="empty-state"><div style="width:64px;height:64px;background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${IC.inbox}</div><div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:6px">Belum ada produk</div><div style="font-size:13px;color:var(--muted)">Pilih kategori lain atau lihat Semua</div></div>`;
    return;
  }
  gridState={items,shown:0,batch:24};
  rowsEl.innerHTML=`<div class="grid-wrap">
    <div class="grid-head"><span class="grid-title">${esc(cat?cat.name:'Produk')}</span><span class="grid-count">${items.length} produk</span></div>
    <div class="grid" id="gridItems"></div>
    <div id="gridMore" style="text-align:center;padding:10px 0 28px"></div>
  </div>`;
  gridShowMore();
  const sentinel=$('#gridMore');
  if(sentinel&&window.IntersectionObserver){
    gridObserver=new IntersectionObserver(es=>{ if(es.some(e=>e.isIntersecting))gridShowMore(); },{rootMargin:'400px'});
    gridObserver.observe(sentinel);
  }
}
function gridShowMore(){
  const grid=$('#gridItems'),more=$('#gridMore');
  if(!grid||!more||gridState.shown>=gridState.items.length)return;
  const next=gridState.items.slice(gridState.shown,gridState.shown+gridState.batch);
  grid.insertAdjacentHTML('beforeend',next.map(cardHtml).join(''));
  gridState.shown+=next.length;
  const left=gridState.items.length-gridState.shown;
  if(left>0){
    more.innerHTML=`<button class="btn-more" onclick="gridShowMore()">Muat lebih banyak (${left} lagi)</button>`;
  }else{
    more.innerHTML=`<div style="font-size:12px;color:var(--muted)">Semua ${gridState.items.length} produk ditampilkan</div>`;
    if(gridObserver){gridObserver.disconnect();gridObserver=null;}
  }
}
window.gridShowMore=gridShowMore;

/* ============ HERO ============ */
function buildHero(catId){
  const cfg=state.config;
  catId=catId||'all';
  // Hero mengikuti kategori aktif: kategori tertentu -> produk unggulan kategori itu
  // (fallback: produk kategori tsb); "Semua" -> produk unggulan global.
  let heroProducts;
  if(catId==='all'){
    const featured=state.products.filter(p=>Number(p.featured)===1);
    heroProducts=featured.length?featured:[...state.products].sort((a,b)=>b.id-a.id).slice(0,6);
  }else{
    const inCat=state.products.filter(p=>String(p.category_id)===String(catId));
    const featCat=inCat.filter(p=>Number(p.featured)===1);
    heroProducts=featCat.length?featCat:inCat.slice(0,6);
    if(!heroProducts.length){
      const gf=state.products.filter(p=>Number(p.featured)===1);
      heroProducts=gf.length?gf:[...state.products].sort((a,b)=>b.id-a.id).slice(0,6);
    }
  }
  state.heroIdx=0;
  const slides=heroProducts.map(p=>({
    media:p.image||p.thumbnail||'',
    badge:(p.badge||p.category_name||'PILIHAN'),
    title:p.name,
    sub:p.summary||p.description||cfg.heroSubtitle||cfg.tagline||'',
    product:p
  }));
  if(!slides.length){
    slides.push({media:cfg.bannerPath||'',badge:cfg.heroPill||'PREMIUM',title:cfg.heroTitle||cfg.storeName||'Cellyn Store',sub:cfg.heroSubtitle||cfg.tagline||'',product:null});
  }

  state.heroSlides=slides;
  const wrap=$('#heroSlides');
  wrap.innerHTML=slides.map((s,i)=>{
    const isVideo=s.media&&(s.media.endsWith('.mp4')||s.media.endsWith('.webm'));
    let media;
    if(!s.media){
      media=`<div class="hero-bg" style="background:linear-gradient(135deg,#3a0a0d,#141414)"></div>`;
    }else if(isVideo){
      media=`<div class="hero-bg" style="background:#0a0a0a"></div><div class="hero-fg"><video src="${esc(s.media)}" autoplay loop muted playsinline></video></div>`;
    }else{
      media=`<div class="hero-bg" style="background-image:url('${esc(s.media)}')"></div><div class="hero-fg"><img src="${esc(s.media)}" alt="${esc(s.title)}" ${i===0?'':'loading="lazy"'}></div>`;
    }
    const p=s.product;
    const disp=p?getProductDisplay(p):null;
    const hasDisc=disp&&disp.orig>0&&disp.orig>disp.price;
    const priceHtml=p?`<div class="hero-price">${hasDisc?`<span class="strike">${rupiah(disp.orig)}</span>`:''}${disp.priceLabel}</div>`:'';
    const btns=p?`
      <div class="hero-btns">
        <button class="btn-hero btn-hero-play" onclick="heroBuy(${p.id})">${IC.cart} Beli Sekarang</button>
        <button class="btn-hero btn-hero-info" onclick="openDetail(${p.id})">${IC.info} Lihat Detail</button>
      </div>`:'';
    return`<div class="hero-slide ${i===0?'active':''}" data-i="${i}">
      ${media}
      <div class="hero-scrim"></div>
      <div class="hero-scrim2"></div>
      <div class="hero-content">
        <div class="hero-badge">${esc(s.badge)}</div>
        <h1 class="hero-title">${esc(s.title)}</h1>
        ${s.sub?`<p class="hero-sub">${esc(s.sub)}</p>`:''}
        ${priceHtml}
        ${btns}
      </div>
    </div>`;
  }).join('');

  const dots=$('#heroDots');
  if(slides.length>1){
    function renderDots(activeIdx){
      const total=slides.length;
      if(total<=5){
        dots.innerHTML=slides.map((_,i)=>`<div class="hero-dot ${i===activeIdx?'active':''}" onclick="heroGo(${i})"></div>`).join('');
        return;
      }
      let html='';
      for(let i=0;i<5;i++){
        let realIdx,cls='';
        if(i===0) realIdx=((activeIdx-2)+total)%total;
        else if(i===1) realIdx=((activeIdx-1)+total)%total;
        else if(i===2){realIdx=activeIdx;cls='active';}
        else if(i===3) realIdx=(activeIdx+1)%total;
        else realIdx=(activeIdx+2)%total;
        if(i===0||i===4) cls='far';
        else if(i===1||i===3) cls='near';
        html+=`<div class="hero-dot ${cls}" onclick="heroGo(${realIdx})"></div>`;
      }
      dots.innerHTML=html;
    }
    renderDots(0);
    startHeroAuto();
  }else dots.innerHTML='';
}
window.heroGo=idx=>{
  const slides=$$('#heroSlides .hero-slide');if(!slides.length)return;
  state.heroIdx=(idx+slides.length)%slides.length;
  slides.forEach((s,i)=>s.classList.toggle('active',i===state.heroIdx));
  renderDots(state.heroIdx);
};
function startHeroAuto(){
  clearInterval(state.heroTimer);
  if(state.heroSlides.length>1)state.heroTimer=setInterval(()=>heroGo(state.heroIdx+1),6500);
}
window.heroBuy=id=>{
  const p=state.products.find(x=>x.id===id);if(!p)return;
  const disp=getProductDisplay(p);
  if(disp.hasVariants){openDetail(id);return;}
  addToCart(p);openCart();
};

window.addToCartFromDetail=id=>{
  const p=state.products.find(x=>x.id===id);if(!p)return;
  const variants=p.variants||[];
  if(variants.length){
    if(!selectedVariant)selectedVariant={id:Number(variants[0].id),name:variants[0].name,price:Number(variants[0].price),stock:Number(variants[0].stock||0)};
    if(selectedVariant.stock<1)return flash('Stok varian habis','err');
    const addQ=Math.max(1,detailQty);
    const key=cartKey(p.id,selectedVariant.id);
    const found=state.cart.find(x=>x.key===key);
    if(found){if(found.qty+addQ>selectedVariant.stock)return flash('Melebihi stok','err');found.qty+=addQ;}
    else state.cart.push({key,id:p.id,variantId:selectedVariant.id,name:p.name+' — '+selectedVariant.name,price:selectedVariant.price,qty:addQ,image:p.thumbnail||p.image,stock:selectedVariant.stock});
    saveCart();updateCartUI();flash(addQ+'x '+p.name+' — '+selectedVariant.name+' ditambahkan','ok');
  }else{
    if(Number(p.stock||0)<1)return flash('Stok habis','err');
    const addQ=Math.max(1,detailQty);
    const key=cartKey(p.id,null);
    const found=state.cart.find(x=>x.key===key);
    if(found){if(found.qty+addQ>Number(p.stock||0))return flash('Melebihi stok','err');found.qty+=addQ;}
    else state.cart.push({key,id:p.id,name:p.name,price:Number(p.price||0),qty:addQ,image:p.thumbnail||p.image,stock:Number(p.stock||0)});
    saveCart();updateCartUI();flash(addQ+'x '+p.name+' ditambahkan','ok');
  }
};
window.buyNowFromDetail=id=>{
  const p=state.products.find(x=>x.id===id);if(!p)return;
  const variants=p.variants||[];let items;
  if(variants.length){
    if(!selectedVariant)selectedVariant={id:Number(variants[0].id),name:variants[0].name,price:Number(variants[0].price),stock:Number(variants[0].stock||0)};
    if(selectedVariant.stock<1)return flash('Stok varian habis','err');
    if(detailQty>selectedVariant.stock)return flash('Melebihi stok','err');
    items=[{id:p.id,name:p.name+' — '+selectedVariant.name,price:selectedVariant.price,qty:Math.max(1,detailQty)}];
  }else{
    if(Number(p.stock||0)<1)return flash('Stok habis','err');
    if(detailQty>Number(p.stock||0))return flash('Melebihi stok','err');
    items=[{id:p.id,name:p.name,price:Number(p.price),qty:Math.max(1,detailQty)}];
  }
  api('/api/build-whatsapp-link',{method:'POST',body:JSON.stringify({items})}).then(r=>{
    api('/api/track-order',{method:'POST',body:JSON.stringify({items})}).catch(()=>{});
    const w=window.open(r.waLink,'_blank','noopener');if(!w)flash('Izinkan popup');closeDetail();
  }).catch(()=>flash('Gagal membuat link WA','err'));
};
window.shareProduct=id=>{
  const p=state.products.find(x=>x.id===id);if(!p)return;

  const shareText=(p.summary||p.name)+' — '+getProductDisplay(p).priceLabel;

window.setRating=(pid,val)=>{
  currentRating=val;
  $$(`#starPicker-${pid} .star-btn`).forEach(b=>b.classList.toggle('active',Number(b.dataset.val)<=val));
};
async function loadReviews(pid){
  try{
    const data=await api('/api/products/'+pid+'/reviews');
    const listEl=$(`#reviewList-${pid}`),avgEl=$(`#reviewAvg-${pid}`);
    if(!listEl)return;
    if(data.avg&&data.total){
      avgEl.innerHTML=`<span class="score">${data.avg}</span><span class="review-stars">${stars(Math.round(data.avg))}</span><span style="font-size:12px;color:var(--muted)">(${data.total} ulasan)</span>`;
    }
    if(!data.reviews.length){listEl.innerHTML='<div style="padding:12px 0;color:var(--muted);font-size:13px">Belum ada ulasan. Jadilah yang pertama!</div>';return;}
    listEl.innerHTML=data.reviews.map(r=>{
      const rr=Math.max(0,Math.min(5,Number(r.rating)||0));
      return`<div class="review-item">
        <div class="review-name">${esc(r.name)}</div>
        <div class="review-stars">${stars(rr)}</div>
        ${r.comment?`<div class="review-comment">${esc(r.comment)}</div>`:''}
        <div class="review-date">${new Date(r.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>`;
    }).join('');
  }catch(e){const el=$(`#reviewList-${pid}`);if(el)el.innerHTML='';}
}
window.submitReview=async pid=>{
  const nameEl=$(`#reviewName-${pid}`),commentEl=$(`#reviewComment-${pid}`);
  const name=nameEl?nameEl.value.trim():'';
  const comment=commentEl?commentEl.value.trim():'';
  if(!name)return flash('Nama wajib diisi','err');
  if(!currentRating)return flash('Pilih bintang dulu','err');
  try{
    await api('/api/products/'+pid+'/reviews',{method:'POST',body:JSON.stringify({name,rating:currentRating,comment})});
    flash('Ulasan terkirim, menunggu persetujuan admin','ok');
    if($(`#reviewName-${pid}`))$(`#reviewName-${pid}`).value='';
    if($(`#reviewComment-${pid}`))$(`#reviewComment-${pid}`).value='';
    currentRating=0;$$(`#starPicker-${pid} .star-btn`).forEach(b=>b.classList.remove('active'));
  }catch(e){flash(e.message,'err');}
};

    <div class="hist-tags">${searchHistory.map(h=>`<span class="hist-tag" onclick="doSearch('${esc(h).replace(/'/g,"\\'")}')">${IC.clock}${esc(h)}</span>`).join('')}</div>`;
}
function renderSearchResults(q){
  const el=$('#searchResults');
  if(!q){renderSearchHistory();return;}
  const all=state.products.filter(p=>[p.name,p.category_name,p.badge,p.summary].join(' ').toLowerCase().includes(q.toLowerCase()));
  if(!all.length){el.innerHTML=`<div style="text-align:center;padding:40px 16px"><div style="width:56px;height:56px;background:rgba(255,255,255,0.06);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">${IC.searchOff}</div><div style="font-size:15px;font-weight:700;color:#fff;margin-bottom:6px">Produk tidak ditemukan</div><div style="font-size:12px;color:var(--muted)">Coba kata kunci lain atau cek ejaan</div></div>`;return;}
  const CAP=40;const results=all.slice(0,CAP);
  el.innerHTML=results.map(p=>{
    const img=p.thumbnail||p.image;const hasDisc=Number(p.original_price||0)>Number(p.price);
    return`<div class="result-item" onclick="closeSearch();saveSearchHistory('${esc(q).replace(/'/g,"\\'")}');openDetail(${p.id})">
      ${img?`<img class="result-img" src="${esc(img)}" alt="${esc(p.name)}">`:`<div class="result-img">${IC.box}</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(p.name)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
          ${hasDisc?`<span style="font-size:10px;color:var(--muted);text-decoration:line-through">${rupiah(p.original_price)}</span>`:''}
          <span style="color:var(--accent);font-weight:700;font-size:13px">${rupiah(p.price)}</span>
        </div>
      </div>
    </div>`;
  }).join('')+(all.length>CAP?`<div style="text-align:center;padding:14px;color:var(--muted);font-size:12px">Menampilkan ${CAP} dari ${all.length} hasil — persempit kata kunci.</div>`:'');
}
window.saveSearchHistory=saveSearchHistory;
window.openSearch=()=>{loadSearchHistory();$('#searchOverlay').classList.add('active');document.body.style.overflow='hidden';setTimeout(()=>{$('#searchInput').focus();renderSearchHistory();},100);};
window.closeSearch=()=>{$('#searchOverlay').classList.remove('active');document.body.style.overflow='';};
$('#searchInput').addEventListener('input',debounce(e=>{const q=e.target.value.trim();q?renderSearchResults(q):renderSearchHistory();},250));

/* ============ PROMO ============ */
window.openPromo=()=>{
  const promo=state.products.filter(p=>{
    const hasDisc=Number(p.original_price||0)>Number(p.price||0);
    const b=(p.badge||'').toLowerCase();
    return hasDisc||b.includes('promo')||b.includes('hot')||b.includes('terlaris');
  });
  const el=$('#promoList');
  if(!promo.length)el.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);font-size:13px">Belum ada produk promo saat ini</div>';
  else el.innerHTML=promo.map(p=>{
    const img=p.thumbnail||p.image;const hasDisc=Number(p.original_price||0)>Number(p.price||0);
    const disc=hasDisc?Math.round((1-p.price/p.original_price)*100):0;
    return`<div class="result-item" onclick="closePromo();openDetail(${p.id})">
      ${img?`<img class="result-img" src="${esc(img)}" alt="${esc(p.name)}">`:`<div class="result-img">${IC.box}</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(p.name)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
          ${hasDisc?`<span style="font-size:10px;color:var(--muted);text-decoration:line-through">${rupiah(p.original_price)}</span>`:''}
          <span style="color:var(--accent);font-weight:700;font-size:13px">${rupiah(p.price)}</span>
          ${hasDisc?`<span class="chip green" style="padding:2px 7px">-${disc}%</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
  $('#promoOverlay').classList.add('active');document.body.style.overflow='hidden';
};
window.closePromo=()=>{$('#promoOverlay').classList.remove('active');document.body.style.overflow='';};

/* ============ MISC ============ */
window.openDiscord=()=>window.open(state.config.discordUrl||'https://discord.gg/cellynstore','_blank','noopener');
window.goHome=()=>{window.scrollTo({top:0,behavior:'smooth'});$('#profileMenu').classList.remove('open');};
window.toggleProfileMenu=e=>{e.stopPropagation();$('#profileMenu').classList.toggle('open');};
document.addEventListener('click',()=>$('#profileMenu').classList.remove('open'));
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDetail();closeSearch();closePromo();closeCart();}});
function updateCatBar(){
  const cb=$('#catBar');if(!cb||cb.style.display==='none')return;
  const show=state.currentCat!=='all'||window.scrollY>Math.max(300,window.innerHeight*0.5);
  cb.classList.toggle('show',show);
}
window.closeAnnounce=()=>{$('#announce').classList.remove('show');document.body.classList.remove('has-announce');};
window.addEventListener('scroll',()=>{
  $('#navbar').classList.toggle('scrolled',window.scrollY>40);
  $('#scrollTop').classList.toggle('show',window.scrollY>500);
  updateCatBar();
},{passive:true});

/* ============ BRANDING (palet Netflix dikunci; hanya konten yang dari admin) ============ */
function applyBranding(cfg){
  if(!cfg)return;
  document.title=cfg.storeName||'Cellyn Store';
  if(cfg.storeName){
    $('#navStoreName').textContent=cfg.storeName.toUpperCase();
    $('#footerName').textContent=cfg.storeName;
    $('#loaderBrand').textContent=cfg.storeName.toUpperCase();
  }
  if(cfg.description){
    let m=document.querySelector('meta[name="description"]');
    if(!m){m=document.createElement('meta');m.name='description';document.head.appendChild(m);}
    m.content=cfg.description;
  }
  if(cfg.logoPath){
    $('#navLogo').innerHTML=`<img src="${esc(cfg.logoPath)}" alt="Logo">`;
    $('#footerLogo').innerHTML=`<img src="${esc(cfg.logoPath)}" alt="Logo">`;
  }
  const foot=cfg.footerText||('© '+new Date().getFullYear()+' '+(cfg.storeName||'Cellyn Store')+' — Semua hak dilindungi.');
  $('#footerText').textContent=foot;
  $('#siteFooter').style.display='block';
  // Kontrol tema dari admin: HANYA aksen yang boleh diubah. Latar & font tetap dikunci (tema Netflix) demi konsistensi.
  if(cfg.primaryColor){
    document.documentElement.style.setProperty('--accent',cfg.primaryColor);
    document.documentElement.style.setProperty('--accent2',cfg.secondaryColor||cfg.primaryColor);
  }else if(cfg.secondaryColor){
    document.documentElement.style.setProperty('--accent2',cfg.secondaryColor);
  }
}

/* ============ FOOTER: kontak + link halaman ============ */
function renderFooterExtras(store,pages){
  store=store||{};
  const c=$('#footerContact');
  if(c){
    const svgMail='<svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 6l10 7 10-7"/></svg>';
    const svgWa='<svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>';
    const svgClock='<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>';
    const svgIg='<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.1" fill="currentColor" stroke="none"/></svg>';
    const svgTt='<svg viewBox="0 0 24 24"><path d="M9 12.5a3.5 3.5 0 1 0 3.5 3.5V4c.8 2 2.7 3.2 4.5 3.3"/></svg>';
    const svgFb='<svg viewBox="0 0 24 24"><path fill="currentColor" stroke="none" d="M13 22v-8h2.7l.4-3H13V9c0-.9.3-1.5 1.6-1.5H16.2V4.9c-.3 0-1.3-.1-2.4-.1-2.3 0-3.8 1.4-3.8 4V11H7.5v3H10v8z"/></svg>';
    let h='';
    if(store.contact_email) h+=`<a class="fc-item" href="mailto:${esc(store.contact_email)}">${svgMail}<span>${esc(store.contact_email)}</span></a>`;
    if(store.whatsapp_number){ const wa=String(store.whatsapp_number).replace(/[^0-9]/g,''); h+=`<a class="fc-item" href="https://wa.me/${esc(wa)}" target="_blank" rel="noopener">${svgWa}<span>${esc(store.whatsapp_number)}</span></a>`; }
    if(store.operating_hours) h+=`<div class="fc-item">${svgClock}<span>${esc(store.operating_hours)}</span></div>`;
    let soc='';
    if(store.instagram_url) soc+=`<a href="${esc(store.instagram_url)}" target="_blank" rel="noopener" aria-label="Instagram">${svgIg}</a>`;
    if(store.tiktok_url) soc+=`<a href="${esc(store.tiktok_url)}" target="_blank" rel="noopener" aria-label="TikTok">${svgTt}</a>`;
    if(store.facebook_url) soc+=`<a href="${esc(store.facebook_url)}" target="_blank" rel="noopener" aria-label="Facebook">${svgFb}</a>`;
    if(soc) h+=`<div class="fc-social">${soc}</div>`;
    c.innerHTML=h;
  }
  const pel=$('#footerPages'),col=$('#footerPagesCol');
  if(pel&&col){
    if(pages&&pages.length){
      pel.innerHTML=pages.map(p=>`<a href="/page/${esc(p.slug)}">${esc(p.title)}</a>`).join('');
      col.style.display='';
    }else{ col.style.display='none'; }
  }
}

/* ============ INIT ============ */
function renderSkeletons(){
  const hero=$('#heroSlides');
  if(hero)hero.innerHTML='<div class="skel-hero shine"></div>';
  const rows=$('#rows');
  if(rows){
    let html='';
    for(let r=0;r<3;r++){
      let cards='';
      for(let c=0;c<6;c++)cards+='<div class="skel-card"><div class="m shine"></div><div class="l shine" style="width:80%"></div><div class="l shine" style="width:50%"></div></div>';
      html+='<section class="skel-row"><div class="skel-head"><div class="skel-title shine"></div></div><div class="skel-track">'+cards+'</div></section>';
    }
    rows.innerHTML=html;
  }
}
function dismissPageLoader(){
  const l=$('#pageLoading');
  if(l&&l.style.display!=='none'){l.classList.add('fade-out');setTimeout(()=>{if(l)l.style.display='none';},500);}
}
async function init(){
  loadCart();updateCartUI();
  renderSkeletons();
  // Brand splash sebentar, lalu skeleton tampil selagi data dimuat
  setTimeout(dismissPageLoader,600);
  try{
    const data=await api('/api/storefront');
    window.__storeLoaded=true;
    state.products=data.products||[];
    state.categories=data.categories||[];
    state.banners=data.banners||[];
    const s=data.store||{};
    state.config={
      storeName:s.name,tagline:s.tagline,description:s.description,heroPill:s.hero_pill,
      heroTitle:s.hero_title,heroSubtitle:s.hero_subtitle,heroDesc:s.hero_desc||s.tagline,
      footerText:s.footer_text,logoPath:s.logo_path,bannerPath:s.banner_path,
      qrisImagePath:s.qris_image_path,discordUrl:s.discord_url,
      whatsappNumber:s.whatsapp_number,waTemplate:s.wa_template,
      primaryColor:s.primary_color,secondaryColor:s.secondary_color
    };
    applyBranding(state.config);
    renderFooterExtras(s, data.pages||[]);

    // Announcement dari notifikasi belum dibaca
    const unread=(data.notifications||[]).filter(n=>!n.is_read);
    if(unread.length){
      const n=unread[0];
      $('#announceText').innerHTML=`<b>${esc(n.title||'Info')}</b>${n.message?' — '+esc(n.message):''}`;
      $('#announce').classList.add('show');
      document.body.classList.add('has-announce');
    }

    buildHero();
    buildChips();
    renderView(state.currentCat);
    updateCatBar();

    // Deep-link: /produk/ID-slug (URL cantik) atau ?produk=ID (kompatibel lama)
    let pid=new URLSearchParams(window.location.search).get('produk');
    if(!pid){const m=window.location.pathname.match(/^\/produk\/(\d+)/);if(m)pid=m[1];}
    if(pid)setTimeout(()=>openDetail(Number(pid)),500);
  }catch(e){
    window.__storeLoaded=true;
    console.error('Init error:',e);
    $('#rows').innerHTML=`<div class="empty-state"><div style="font-size:44px">${IC.warn}</div><div style="margin-top:12px;color:#fff;font-weight:700">Gagal memuat data</div><div style="font-size:13px;margin-top:6px">Coba muat ulang halaman.</div></div>`;
  }finally{
    dismissPageLoader();
  }
}
init();
</script>
<canvas id="bgCanvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.7"></canvas>
<script>
(function(){
  const canvas = document.getElementById('bgCanvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars=[], shootingStars=[], particles=[], fwEnabled=false;

  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; initStars(); }
  window.addEventListener('resize', resize); resize();

  // === BINTANG KELAP KELIP ===
  function initStars(){
    stars=[];
    for(let i=0;i<150;i++) stars.push({
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.4+0.3,
      o:Math.random()*0.6+0.1,
      targetO:Math.random()*0.6+0.1,
      speed:Math.random()*0.02+0.005
    });
  }

  function drawStars(){
    stars.forEach(s=>{
      if(Math.abs(s.o-s.targetO)<0.01) s.targetO=Math.random()*0.7+0.05;
      s.o += (s.targetO-s.o)*s.speed;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.o})`;
      ctx.fill();
    });
  }

  // === BINTANG JATUH ===
  function spawnShootingStar(){
    shootingStars.push({
      x: Math.random()*W*0.7,
      y: Math.random()*H*0.4,
      len: 80+Math.random()*120,
      speed: 8+Math.random()*10,
      angle: Math.PI/5,
      life: 1,
      trail: []
    });
  }

  function drawShootingStars(){
    shootingStars = shootingStars.filter(s=>s.life>0.01);
    shootingStars.forEach(s=>{
      s.x += Math.cos(s.angle)*s.speed;
      s.y += Math.sin(s.angle)*s.speed;
      s.life *= 0.97;
      const tailX = s.x - Math.cos(s.angle)*s.len;
      const tailY = s.y - Math.sin(s.angle)*s.len;
      const grad = ctx.createLinearGradient(tailX,tailY,s.x,s.y);
      grad.addColorStop(0,'rgba(255,255,255,0)');
      grad.addColorStop(1,`rgba(255,255,255,${s.life*0.9})`);
      ctx.beginPath();
      ctx.moveTo(tailX,tailY);
      ctx.lineTo(s.x,s.y);
      ctx.strokeStyle=grad;
      ctx.lineWidth=2;
      ctx.stroke();
      if(s.x>W||s.y>H) s.life=0;
    });
  }

  // === KEMBANG API ===
  function spawnFirework(){
    const x = W*0.1+Math.random()*W*0.8;
    const y = H*0.05+Math.random()*H*0.45;
    const hue = Math.random()*360;
    const count = 80+Math.floor(Math.random()*60);
    for(let i=0;i<count;i++){
      const angle=(Math.PI*2/count)*i;
      const speed=2+Math.random()*5;
      particles.push({
        x,y,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        life:1,hue,
        r:Math.random()*2.5+0.8,
        decay:0.93+Math.random()*0.04
      });
    }
    // Tambah trailing rocket effect
    for(let i=0;i<15;i++){
      particles.push({
        x,y,
        vx:(Math.random()-0.5)*1.5,
        vy:Math.random()*-3,
        life:0.6,hue:60,
        r:Math.random()*1.5+0.5,
        decay:0.88
      });
    }
  }

  function drawParticles(){
    particles=particles.filter(p=>p.life>0.02);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      p.vy+=0.06; p.vx*=0.99; p.vy*=0.99;
      p.life*=p.decay;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},100%,65%,${p.life})`;
      ctx.fill();
    });
  }

  let lastFw=0, lastStar=0;
  function loop(){
    ctx.clearRect(0,0,W,H);
    drawStars();
    const now=Date.now();
    if(now-lastStar>2000+Math.random()*3000){ spawnShootingStar(); lastStar=now; }
    drawShootingStars();
    if(fwEnabled){
      if(now-lastFw>800+Math.random()*600){ spawnFirework(); if(Math.random()>0.5) spawnFirework(); lastFw=now; }
      drawParticles();
    }
    requestAnimationFrame(loop);
  }
  loop();

  function checkFw(){
    fetch('/api/storefront').then(r=>r.json()).then(d=>{
      fwEnabled=d.store?.fireworks_enabled==='1';
    }).catch(()=>{});
  }
  checkFw();
  setInterval(checkFw,30000);
})();
</script>
