<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cellyn Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --accent:#c084fc;
  --accent2:#e879f9;
  --bg:#0a0a0f;
  --bg2:#12121a;
  --bg3:#1a1a26;
  --text:#ffffff;
  --muted:#6b7280;
  --border:#2a2a3a;
  --card:#16161f;
  --radius:16px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:80px}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer}

/* HEADER */
.header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand-pill{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:6px 12px 6px 6px}
.brand-dot{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0;overflow:hidden}
.brand-dot img{width:100%;height:100%;object-fit:cover}
.brand-name{font-size:13px;font-weight:700;color:var(--text)}
.brand-arrow{color:var(--muted);font-size:12px;margin-left:2px}
.header-actions{display:flex;gap:8px}
.icon-btn{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative}
.icon-btn svg{width:18px;height:18px;stroke:var(--text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* HERO */
.hero{padding:8px 16px 12px}
.hero-title{font-size:28px;font-weight:900;line-height:1.15;margin-bottom:4px;letter-spacing:-0.02em}
.hero-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:13px;color:var(--muted);line-height:1.5;margin-top:6px}

/* MARQUEE */
.marquee-wrap{overflow:hidden;background:linear-gradient(90deg,rgba(192,132,252,0.12),rgba(232,121,249,0.12));border-top:1px solid rgba(192,132,252,0.2);border-bottom:1px solid rgba(192,132,252,0.2);padding:7px 0;margin-bottom:0;display:none}
.marquee-wrap.visible{display:block}
.marquee-track{display:flex;width:max-content;animation:marquee-scroll 22s linear infinite}
.marquee-track:hover{animation-play-state:paused}
.marquee-text{font-size:12px;font-weight:600;color:var(--accent);padding:0 40px;white-space:nowrap}
@keyframes marquee-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* SEARCH BAR */
.search-bar-wrap{padding:12px 16px 14px}
.search-bar{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:10px 16px;transition:border-color 0.15s}
.search-bar:focus-within{border-color:var(--accent)}
.search-bar svg{width:16px;height:16px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;flex-shrink:0}
.search-bar input{flex:1;background:none;border:none;outline:none;font-size:13px;color:var(--text);font-family:inherit}
.search-bar input::placeholder{color:var(--muted)}

/* FILTER TABS */
.filter-tabs{display:flex;gap:8px;padding:0 16px;overflow-x:auto;scrollbar-width:none;margin-bottom:0}
.filter-tabs::-webkit-scrollbar{display:none}
.filter-tab{background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:8px 16px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.filter-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* BANNER SLIDER */
.slider-wrap{padding:12px 16px 16px;margin-bottom:0}
.slider{border-radius:20px;overflow:hidden;position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,#1a0a2e,#2d1b69)}
.slider-track{display:flex;height:100%;transition:transform 0.4s cubic-bezier(.4,0,.2,1)}
.slide{min-width:100%;height:100%;position:relative;flex-shrink:0}
.slide img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.slide-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,transparent 60%)}
.slide-content{position:absolute;bottom:0;left:0;right:0;padding:16px}
.slide-badge{display:inline-block;background:rgba(192,132,252,0.2);border:1px solid rgba(192,132,252,0.4);color:var(--accent);font-size:10px;font-weight:700;padding:3px 10px;border-radius:99px;letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px}
.slide-title{font-size:20px;font-weight:800;color:#fff;line-height:1.2}
.slider-dots{display:flex;gap:4px;margin-top:10px}
.s-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);cursor:pointer;transition:all 0.2s}
.s-dot.active{background:var(--accent);width:16px;border-radius:99px}
.slider-prev,.slider-next{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.4);border:none;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;z-index:10;backdrop-filter:blur(4px)}
.slider-prev{left:8px}
.slider-next{right:8px}

/* CAT TABS */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:0 16px;margin-bottom:16px}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{display:flex;align-items:center;gap:6px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:7px 14px 7px 8px;font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap;flex-shrink:0;transition:all 0.15s}
.cat-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent;color:#fff}
.cat-icon{width:22px;height:22px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;overflow:hidden}
.cat-icon img{width:100%;height:100%;object-fit:cover}

/* SECTION */
.section{padding:0 16px;margin-bottom:24px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:17px;font-weight:800}
.section-link{font-size:12px;color:var(--accent);font-weight:600}

/* PRODUCT CARD (definisi lengkap ada di bagian CARD ANIMATIONS di bawah) */

/* FOOTER */
.site-footer{padding:24px 16px 12px;text-align:center;border-top:1px solid var(--border);margin-top:8px}
.site-footer p{font-size:11px;color:var(--muted);line-height:1.6}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:8px 0 env(safe-area-inset-bottom,12px);display:flex;justify-content:space-around;z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 16px;cursor:pointer;position:relative}
.nav-icon{width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.nav-icon svg{width:22px;height:22px;stroke:var(--muted);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.15s}
.nav-label{font-size:10px;font-weight:600;color:var(--muted);transition:color 0.15s}
.nav-item.active .nav-label{color:var(--accent)}
.nav-item.active .nav-icon svg{stroke:var(--accent);filter:drop-shadow(0 0 5px var(--accent))}
.cart-badge{position:absolute;top:-2px;right:6px;background:var(--accent2);color:#fff;font-size:9px;font-weight:800;border-radius:99px;padding:1px 5px;min-width:16px;text-align:center}

/* FLASH */
.flash{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:999;padding:10px 18px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:99px;font-size:12px;font-weight:600;display:none;white-space:nowrap;max-width:88vw;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.flash.show{display:block}

/* CATALOG PAGES - slide transition */
#catalogPages{position:relative;overflow:hidden}
.pages-track{display:flex;transition:transform 0.38s cubic-bezier(0.4,0,0.2,1);will-change:transform}
.page-slide{min-width:100%;flex-shrink:0}

/* OVERLAY - spring slide up */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:200;display:none;align-items:flex-end;transition:background 0.3s ease}
.overlay.active{display:flex;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)}
.sheet{background:var(--bg2);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;border-top:1px solid var(--border);transform:translateY(100%);transition:transform 0.42s cubic-bezier(0.34,1.56,0.64,1)}
.overlay.active .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:12px auto 0}
.sheet-inner{padding:16px 16px 32px}
.sheet-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sheet-title{font-size:17px;font-weight:800}
.sheet-close{background:var(--bg3);border:none;border-radius:99px;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:background 0.15s}
.sheet-close:active{background:var(--border)}

/* CART */
.cart-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:46px;height:46px;border-radius:10px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-size:13px;font-weight:700;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cart-item-price{font-size:11px;color:var(--muted)}
.qty-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);background:var(--bg3);font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);font-weight:700;transition:all 0.15s}
.qty-btn:active{transform:scale(0.88);background:var(--accent);border-color:var(--accent);color:#fff}
.qty-num{font-size:13px;font-weight:800;min-width:18px;text-align:center}
.cart-summary{background:var(--bg3);border-radius:12px;padding:12px 14px;margin:12px 0;border:1px solid var(--border)}
.sum-row{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--muted)}
.sum-total{font-weight:800;color:var(--accent);font-size:15px}
.btn-wa{width:100%;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:99px;padding:14px;font-size:14px;font-weight:700;margin-top:12px;transition:opacity 0.15s,transform 0.1s}
.btn-wa:active{transform:scale(0.98);opacity:0.9}
.btn-wa:disabled{background:var(--bg3);color:var(--muted);cursor:not-allowed;transform:none}
.btn-clear{width:100%;background:var(--bg3);color:var(--muted);border:1px solid var(--border);border-radius:99px;padding:10px;font-size:12px;font-weight:600;margin-top:8px;transition:opacity 0.15s}
.btn-clear:active{opacity:0.7}

/* QRIS - fix tidak gepeng */
.qris-wrap{text-align:center;margin:14px 0}
.qris-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:600}
.qris-img{width:180px;height:180px;object-fit:contain;margin:0 auto;border-radius:12px;border:1px solid var(--border);background:#fff;padding:8px}

/* WA PREVIEW */
.wa-preview{background:var(--bg3);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--muted);white-space:pre-wrap;margin:10px 0;max-height:100px;overflow-y:auto;line-height:1.5;display:none;border:1px solid var(--border)}

/* DETAIL */
.detail-img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:14px;background:var(--bg3);margin-bottom:14px}
.detail-badge{font-size:10px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px}
.detail-name{font-size:20px;font-weight:800;margin-bottom:6px;line-height:1.2}
.detail-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.meta-item{background:var(--bg3);border-radius:10px;padding:10px 12px;border:1px solid var(--border)}
.meta-label{font-size:9px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:3px}
.meta-value{font-size:15px;font-weight:800}
.btn-add-detail{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:99px;padding:14px;font-size:15px;font-weight:700;transition:transform 0.1s,opacity 0.15s}
.btn-add-detail:active{transform:scale(0.97)}
.btn-add-detail:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.share-btn{width:100%;background:var(--bg3);color:var(--text);border:1px solid var(--border);border-radius:99px;padding:10px;font-size:13px;font-weight:600;margin-top:8px;transition:border-color 0.15s}
.share-btn:active{border-color:var(--accent)}

/* PROMO */
.promo-empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}

/* SKELETON */
.skeleton-h{background:var(--card);border-radius:var(--radius);overflow:hidden;flex-shrink:0;width:140px;border:1px solid var(--border)}
.skeleton-img-h{aspect-ratio:1/1;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
.skeleton-body-h{padding:8px 10px 10px;display:flex;flex-direction:column;gap:5px}
.skeleton-line{height:9px;border-radius:99px;background:linear-gradient(90deg,var(--bg3) 25%,var(--bg2) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* CARD ANIMATIONS - lebih smooth dengan spring */
@keyframes card-in{0%{opacity:0;transform:translateY(22px) scale(0.97)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes card-in-h{0%{opacity:0;transform:translateX(16px)}100%{opacity:1;transform:translateX(0)}}
.product-card-h{background:var(--card);border-radius:var(--radius);overflow:hidden;flex-shrink:0;width:140px;border:1px solid var(--border);transition:transform 0.18s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.18s;animation:card-in-h 0.4s cubic-bezier(0.34,1.2,0.64,1) both}
.product-card-h:active{transform:scale(0.94)!important;box-shadow:0 0 0 2px var(--accent)}
.product-card-v{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);display:flex;gap:12px;padding:10px;align-items:center;margin-bottom:8px;transition:transform 0.15s,box-shadow 0.15s;animation:card-in 0.38s cubic-bezier(0.34,1.2,0.64,1) both}
.product-card-v:active{transform:scale(0.98);box-shadow:0 0 0 1.5px var(--accent)}
.product-card-h:nth-child(1){animation-delay:.04s}.product-card-h:nth-child(2){animation-delay:.10s}.product-card-h:nth-child(3){animation-delay:.16s}.product-card-h:nth-child(4){animation-delay:.22s}.product-card-h:nth-child(5){animation-delay:.28s}.product-card-h:nth-child(6){animation-delay:.34s}
.product-card-v:nth-child(1){animation-delay:.06s}.product-card-v:nth-child(2){animation-delay:.12s}.product-card-v:nth-child(3){animation-delay:.18s}.product-card-v:nth-child(4){animation-delay:.24s}.product-card-v:nth-child(5){animation-delay:.30s}.product-card-v:nth-child(6){animation-delay:.36s}.product-card-v:nth-child(7){animation-delay:.42s}.product-card-v:nth-child(8){animation-delay:.48s}
.product-img-h{width:100%;aspect-ratio:1/1;object-fit:cover;background:var(--bg3)}
.product-img-placeholder-h{width:100%;aspect-ratio:1/1;background:linear-gradient(135deg,var(--bg3),var(--bg2));display:flex;align-items:center;justify-content:center;font-size:32px}
.product-body-h{padding:8px 10px 10px}
.product-cat-h{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--accent);letter-spacing:0.05em;margin-bottom:2px}
.product-name-h{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--text)}
.product-price-h{font-size:13px;font-weight:800;color:var(--accent)}
.product-stock-ok{font-size:9px;color:#4ade80;font-weight:600;margin-top:2px}
.product-img-v{width:56px;height:56px;border-radius:10px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.product-body-v{flex:1;min-width:0}
.product-name-v{font-size:13px;font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-sub-v{font-size:11px;color:var(--muted);margin-bottom:4px}
.product-price-v{font-size:12px;font-weight:800;color:var(--accent)}
.product-action-v{flex-shrink:0}
.btn-buy{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:99px;padding:8px 14px;font-size:11px;font-weight:700;transition:transform 0.12s cubic-bezier(0.34,1.56,0.64,1)}
.btn-buy:active{transform:scale(0.88)}
.badge-promo{display:inline-block;background:rgba(192,132,252,0.15);color:var(--accent);font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px}

/* RIPPLE */
.ripple-wrap{position:relative;overflow:hidden}
@keyframes ripple{0%{transform:scale(0);opacity:0.5}100%{transform:scale(4);opacity:0}}
.ripple-el{position:absolute;border-radius:50%;background:rgba(192,132,252,0.35);pointer-events:none;animation:ripple 0.5s ease-out forwards;width:80px;height:80px;margin:-40px}

/* SCROLL TOP */
.scroll-top{position:fixed;bottom:90px;right:16px;width:40px;height:40px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:18px;cursor:pointer;z-index:90;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(192,132,252,0.4);transition:transform 0.2s cubic-bezier(0.34,1.56,0.64,1)}
.scroll-top.visible{display:flex}
.scroll-top:active{transform:scale(0.88)}
/* LOADING OVERLAY */
.page-loading{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.5s ease}
.page-loading.fade-out{opacity:0;pointer-events:none}
.loader-ring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
.loader-brand{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:0.08em}
@keyframes spin{to{transform:rotate(360deg)}}

/* DESKTOP RESPONSIVE */
@media(min-width:600px){
  .product-card-h{width:160px}
}

/* REVIEW SECTION */
.review-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.review-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em}
.review-avg{display:flex;align-items:center;gap:6px}
.review-avg-score{font-size:22px;font-weight:900;color:var(--text)}
.review-avg-stars{font-size:14px}
.review-avg-count{font-size:11px;color:var(--muted)}
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-name{font-size:13px;font-weight:700;margin-bottom:2px}
.review-stars{font-size:12px;margin-bottom:4px}
.review-comment{font-size:13px;color:var(--muted);line-height:1.5}
.review-date{font-size:11px;color:var(--border);margin-top:4px}
.review-form{background:var(--bg3);border-radius:14px;padding:14px;margin-top:14px;border:1px solid var(--border)}
.review-form-title{font-size:13px;font-weight:700;margin-bottom:12px}
.star-picker{display:flex;gap:4px;margin-bottom:10px}
.star-btn{font-size:24px;cursor:pointer;opacity:0.3;transition:opacity 0.1s,transform 0.1s;background:none;border:none;padding:0}
.star-btn.active{opacity:1}
.star-btn:active{transform:scale(1.2)}
.variant-option{transition:all 0.15s}
.variant-option.selected{border-color:var(--accent)!important;background:rgba(192,132,252,0.08)!important}
.variant-option:active{transform:scale(0.98)}
.sold-badge{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}
.sold-badge span{color:#fbbf24}
.new-badge{display:inline-block;background:rgba(74,222,128,0.15);color:#4ade80;font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px;margin-left:4px}

/* CARD V improvements */
.product-img-v{width:72px;height:72px;border-radius:12px;object-fit:cover;background:var(--bg3);flex-shrink:0}

/* DETAIL IMPROVEMENTS */
.detail-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.btn-buy-now{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border:none;border-radius:99px;padding:14px;font-size:14px;font-weight:700;transition:transform 0.1s,opacity 0.15s;width:100%}
.btn-buy-now:active{transform:scale(0.97)}
.related-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.related-title{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:0.04em}
.related-grid{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.related-grid::-webkit-scrollbar{display:none}
.related-card{flex-shrink:0;width:110px;background:var(--bg3);border-radius:12px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s}
.related-card:active{transform:scale(0.95)}
.related-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg)}
.related-body{padding:6px 8px 8px}
.related-name{font-size:11px;font-weight:700;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px;line-height:1.3}
.related-price{font-size:11px;font-weight:800;color:var(--accent)}

/* SEARCH HISTORY */
.search-history{margin-bottom:12px}
.search-hist-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;display:flex;justify-content:space-between}
.search-hist-clear{color:var(--accent);cursor:pointer;font-weight:600}
.search-hist-tags{display:flex;flex-wrap:wrap;gap:6px}
.hist-tag{background:var(--bg3);border:1px solid var(--border);border-radius:99px;padding:5px 12px;font-size:12px;color:var(--text);cursor:pointer;transition:border-color 0.15s}
.hist-tag:active{border-color:var(--accent)}

/* ADD TO CART FEEDBACK */
@keyframes cart-pop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.cart-pop{animation:cart-pop 0.3s ease}
</style>
</head>

<script>
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
// Escape teks agar aman dimasukkan ke innerHTML (cegah XSS)
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function rupiah(n){return 'Rp'+new Intl.NumberFormat('id-ID').format(Number(n||0));}
function flash(msg){const el=$('#flash');el.textContent=msg;el.classList.add('show');clearTimeout(window._ft);window._ft=setTimeout(()=>el.classList.remove('show'),2200);}
async function api(url,opt={}){
  const options={credentials:'include',...opt};
  if(opt.body&&!(opt.body instanceof FormData))options.headers={...(opt.headers||{}),'Content-Type':'application/json'};
  const res=await fetch(url,options);
  const text=await res.text();
  const data=text?JSON.parse(text):{};
  if(!res.ok)throw new Error(data.error||'Request gagal');
  return data;
}
function debounce(fn,ms){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms);};}

const state={products:[],categories:[],config:{},cart:[],currentPage:0,banners:[]};

// ── CART ──
// Kunci unik per baris keranjang: bedakan varian dari produk yang sama
function cartKey(id,variantId){return variantId?(id+':'+variantId):('p'+id);}
function saveCart(){try{localStorage.setItem('cellyn_cart',JSON.stringify(state.cart));}catch(e){}}
function loadCart(){
  try{state.cart=JSON.parse(localStorage.getItem('cellyn_cart')||'[]');}catch(e){state.cart=[];}
  // Migrasi keranjang lama yang belum punya key
  state.cart.forEach(it=>{if(!it.key)it.key=cartKey(it.id,it.variantId);});
}
function cartCount(){return state.cart.reduce((a,b)=>a+b.qty,0);}
function cartTotal(){return state.cart.reduce((a,b)=>a+(b.price*b.qty),0);}

function addToCart(p){
  if(Number(p.stock||0)<1)return flash('❌ Stok habis');
  const key=cartKey(p.id,null);
  const found=state.cart.find(x=>x.key===key);
  if(found){if(found.qty+1>Number(p.stock||0))return flash('❌ Melebihi stok');found.qty++;}
  else state.cart.push({key,id:p.id,name:p.name,price:Number(p.price||0),qty:1,image:p.image,stock:Number(p.stock||0)});
  saveCart();updateCartUI();
  flash('✅ '+p.name+' ditambahkan ke keranjang');
  // Animasi cart badge
  $$('#cartBadge,#cartBadge2').forEach(el=>{
    el.classList.remove('cart-pop');
    void el.offsetWidth;
    el.classList.add('cart-pop');
    setTimeout(()=>el.classList.remove('cart-pop'),300);
  });
}

function updateQty(key,delta){
  const item=state.cart.find(x=>x.key===key);if(!item)return;
  if(delta>0&&item.qty+1>Number(item.stock||0))return flash('❌ Melebihi stok');
  item.qty+=delta;
  if(item.qty<=0)state.cart=state.cart.filter(x=>x.key!==key);
  saveCart();renderCartItems();
}

function updateCartUI(){
  const c=cartCount();
  $$('#cartBadge,#cartBadge2').forEach(el=>{el.textContent=c;el.style.display=c>0?'inline':'none';});
}

function renderCartItems(){
  const el=$('#cartItems'),summary=$('#cartSummary'),waEl=$('#waPreview');
  const waBtn=$('#checkoutWaBtn');
  if(!state.cart.length){
    el.innerHTML='<div style="text-align:center;padding:40px 0;color:var(--muted)"><div style="font-size:40px;margin-bottom:12px">🛒</div><div style="font-size:14px;font-weight:600">Keranjang kosong</div><div style="font-size:12px;margin-top:4px">Tambahkan produk dulu</div></div>';
    summary.style.display='none';waEl.style.display='none';
    waBtn.disabled=true;waBtn.textContent='Keranjang Kosong';
    return;
  }
  waBtn.disabled=false;waBtn.textContent='💬 Chat WhatsApp & Konfirmasi';
  el.innerHTML=state.cart.map(i=>`
    <div class="cart-item">
      ${i.image?`<img class="cart-item-img" src="${esc(i.image)}" alt="${esc(i.name)}">`:`<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">🛍️</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(i.name)}</div>
        <div class="cart-item-price">${rupiah(i.price)}</div>
      </div>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="updateQty('${i.key}',-1)">−</button>
        <span class="qty-num">${i.qty}</span>
        <button class="qty-btn" onclick="updateQty('${i.key}',1)">+</button>
      </div>
    </div>`).join('');
  summary.style.display='block';
  $('#sumItems').textContent=cartCount()+' item';
  $('#sumTotal').textContent=rupiah(cartTotal());
  if(state.config.qrisImagePath){$('#qrisWrap').style.display='block';$('#qrisImg').src=state.config.qrisImagePath;}
  api('/api/build-whatsapp-link',{method:'POST',body:JSON.stringify({items:state.cart})}).then(r=>{
    waEl.textContent=r.message;waEl.style.display='block';window._waLink=r.waLink;
  }).catch(()=>{});
  updateCartUI();
}

function openCart(){$('#cartOverlay').classList.add('active');renderCartItems();}
function closeCart(){$('#cartOverlay').classList.remove('active');}
$('#clearCartBtn').onclick=()=>{state.cart=[];saveCart();renderCartItems();updateCartUI();};
$('#checkoutWaBtn').onclick=()=>{
  if(!state.cart.length)return flash('Keranjang kosong');
  if(window._waLink){
    // Catat sebagai order (menambah jumlah terjual)
    api('/api/track-order',{method:'POST',body:JSON.stringify({items:state.cart})}).catch(()=>{});
    const w=window.open(window._waLink,'_blank','noopener');if(!w)flash('Izinkan popup di browser');
  }
  else flash('Menyiapkan link WA...');
};

// ── SEARCH ──
let searchHistory=[];
function loadSearchHistory(){try{searchHistory=JSON.parse(localStorage.getItem('cellyn_sh')||'[]');}catch(e){searchHistory=[];}}
function saveSearchHistory(q){
  if(!q||q.length<2)return;
  searchHistory=([q,...searchHistory.filter(x=>x!==q)]).slice(0,8);
  try{localStorage.setItem('cellyn_sh',JSON.stringify(searchHistory));}catch(e){}
}
function renderSearchHistory(){
  const el=$('#searchResults');
  if(!searchHistory.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">Ketik nama produk...</div>';return;}
  el.innerHTML=`<div class="search-history">
    <div class="search-hist-title">Pencarian terakhir <span class="search-hist-clear" onclick="clearSearchHistory()">Hapus</span></div>
    <div class="search-hist-tags">${searchHistory.map(h=>`<span class="hist-tag" onclick="doSearch('${esc(h).replace(/'/g,"\\'")}')">🕐 ${esc(h)}</span>`).join('')}</div>
  </div>`;
}
function clearSearchHistory(){searchHistory=[];try{localStorage.removeItem('cellyn_sh');}catch(e){}renderSearchHistory();}
function doSearch(q){$('#searchInput').value=q;renderSearchResults(q);}

function openSearch(){
  loadSearchHistory();
  $('#searchOverlay').classList.add('active');
  setTimeout(()=>{$('#searchInput').focus();renderSearchHistory();},100);
}
function closeSearch(){$('#searchOverlay').classList.remove('active');}

function renderSearchResults(q){
  const el=$('#searchResults');
  if(!q){renderSearchHistory();return;}
  const results=state.products.filter(p=>[p.name,p.category_name,p.badge,p.summary].join(' ').toLowerCase().includes(q.toLowerCase()));
  if(!results.length){el.innerHTML='<div style="text-align:center;padding:24px;color:var(--muted);font-size:13px">😕 Tidak ditemukan</div>';return;}
  el.innerHTML=results.map(p=>`
    <div class="cart-item" onclick="closeSearch();saveSearchHistory('${esc(q).replace(/'/g,"\\'")}');openDetail(${p.id})" style="cursor:pointer">
      ${p.image?`<img class="cart-item-img" src="${esc(p.image)}" alt="${esc(p.name)}">`:`<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">🛍️</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${esc(p.name)}</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
          ${Number(p.original_price||0)>Number(p.price)?`<span style="font-size:10px;color:var(--muted);text-decoration:line-through">${rupiah(p.original_price)}</span>`:''}
          <span style="color:var(--accent);font-weight:700;font-size:13px">${rupiah(p.price)}</span>
        </div>
      </div>
    </div>`).join('');
}
$('#searchInput').addEventListener('input',debounce(e=>{
  const q=e.target.value.trim();
  if(!q)renderSearchHistory();
  else renderSearchResults(q);
},300));

// Inline search → buka overlay search
$('#inlineSearchInput').addEventListener('input',debounce(e=>{
  const q=e.target.value.trim();
  if(!q)return;
  openSearch();
  setTimeout(()=>{
    $('#searchInput').value=q;
    renderSearchResults(q);
    e.target.value='';
  },150);
},300));

// ── PROMO ──
function openPromo(){
  const promoProds=state.products.filter(p=>{
    const b=(p.badge||'').toLowerCase();
    const hasDisc=Number(p.original_price||0)>Number(p.price||0);
    return hasDisc||b.includes('promo')||b.includes('hot')||b.includes('terlaris');
  });
  const el=$('#promoList');
  if(!promoProds.length){
    el.innerHTML='<div class="promo-empty">Belum ada produk promo saat ini</div>';
  } else {
    el.innerHTML=promoProds.map(p=>{
      const hasDisc=Number(p.original_price||0)>Number(p.price||0);
      const disc=hasDisc?Math.round((1-p.price/p.original_price)*100):0;
      return`<div class="cart-item" onclick="closePromo();openDetail(${p.id})" style="cursor:pointer">
        ${p.image?`<img class="cart-item-img" src="${esc(p.image)}" alt="${esc(p.name)}">`:`<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px">🛍️</div>`}
        <div class="cart-item-info">
          <div class="cart-item-name">${esc(p.name)}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
            ${hasDisc?`<span style="font-size:10px;color:var(--muted);text-decoration:line-through">${rupiah(p.original_price)}</span>`:''}
            <span style="color:var(--accent);font-weight:700;font-size:12px">${rupiah(p.price)}</span>
            ${hasDisc?`<span style="background:rgba(192,132,252,0.15);color:var(--accent);font-size:9px;font-weight:700;padding:2px 6px;border-radius:99px">-${disc}%</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
  $('#promoOverlay').classList.add('active');
}
function closePromo(){$('#promoOverlay').classList.remove('active');}

// ── DISCORD ──
window.openDiscord=()=>{
  window.open(state.config.discordUrl||'https://discord.gg/cellynstore','_blank','noopener');
};

// ── NAV ──
function setActiveNav(id){
  $$('.nav-item').forEach(el=>el.classList.remove('active'));

// ── BANNER SLIDER ──
let sliderIdx=0,sliderTimer=null,sliderTouchX=0;

function initSlider(banners){
  const track=$('#sliderTrack');
  const dots=$('#sliderDots');
  const cfg=state.config;

  if(!banners||!banners.length){
    // Single slide dari config
    if(cfg.bannerPath){
      const slide=track.querySelector('.slide');
      let img=slide.querySelector('img');
      if(!img){img=document.createElement('img');slide.insertBefore(img,slide.firstChild);}
      img.src=cfg.bannerPath;
    }
    if(cfg.heroPill)$('#heroPill')&&($('#heroPill').textContent=cfg.heroPill);
    if(cfg.heroSubtitle)$('#heroSubtitle')&&($('#heroSubtitle').textContent=cfg.heroSubtitle);
    dots.innerHTML='<div class="s-dot active"></div>';
    return;
  }

  // Multi banner
  track.innerHTML=banners.map((b,i)=>{
    const isVideo=b.image_path&&(b.image_path.endsWith('.mp4')||b.image_path.endsWith('.webm'));
    const media=b.image_path
      ?(isVideo
        ?`<video src="${esc(b.image_path)}" autoplay loop muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"></video>`
        :`<img src="${esc(b.image_path)}" alt="${esc(b.title||'')}" loading="${i===0?'eager':'lazy'}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover">`)
      :'';
    return`<div class="slide">
      ${media}
      <div class="slide-overlay"></div>
      <div class="slide-content">
        <div class="slide-badge">${esc(b.badge||cfg.heroPill||'APP PREMIUM')}</div>
        <div class="slide-title">${esc(b.title||cfg.heroSubtitle||'LIMITED-TIME DROPS AWAIT!')}</div>
      </div>
    </div>`;
  }).join('');

  dots.innerHTML=banners.map((_,i)=>`<div class="s-dot${i===0?' active':''}" onclick="goToSlide(${i})"></div>`).join('');

  if(banners.length>1){
    $('#sliderPrev').style.display='flex';
    $('#sliderNext').style.display='flex';
    startSliderAuto();
  }

  // Touch swipe khusus di slider saja
  const slider=$('#mainSlider');
  slider.addEventListener('touchstart',e=>{sliderTouchX=e.touches[0].clientX;},{passive:true});
  slider.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sliderTouchX;
    if(Math.abs(dx)>40){
      dx<0?sliderMove(1):sliderMove(-1);
      e.stopPropagation();
    }
  },{passive:true});
}

function goToSlide(idx){
  const total=state.banners.length||1;
  sliderIdx=(idx+total)%total;
  const track=$('#sliderTrack');
  if(track)track.style.transform=`translateX(-${sliderIdx*100}%)`;
  $$('#sliderDots .s-dot').forEach((d,i)=>d.classList.toggle('active',i===sliderIdx));
}

window.sliderMove=(dir)=>{
  goToSlide(sliderIdx+dir);
  clearInterval(sliderTimer);
  startSliderAuto();
};

function startSliderAuto(){
  clearInterval(sliderTimer);
  if((state.banners||[]).length>1)sliderTimer=setInterval(()=>goToSlide(sliderIdx+1),4000);
}

// ── PRODUCTS ──
function getBadgeHtml(p){
  const orig=Number(p.original_price||0),price=Number(p.price);
  const hasDisc=orig>0&&orig>price;
  const discPct=hasDisc?Math.round((1-price/orig)*100):0;
  const b=(p.badge||'').toLowerCase();
  if(hasDisc||b.includes('promo'))return`<span style="background:rgba(192,132,252,0.2);color:var(--accent);font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px">PROMO${discPct?` -${discPct}%`:''}</span>`;
  if(b.includes('hot')||b.includes('terlaris'))return`<span style="background:rgba(239,68,68,0.2);color:#f87171;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px">🔥 Terlaris</span>`;
  if(b.includes('new')||b.includes('baru'))return`<span style="background:rgba(74,222,128,0.2);color:#4ade80;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px">✨ Baru</span>`;
  if(b.includes('best'))return`<span style="background:rgba(251,191,36,0.2);color:#fbbf24;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px">⭐ Best</span>`;
  if(p.badge)return`<span style="background:var(--bg3);color:var(--muted);font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px">${esc(p.badge)}</span>`;
  return '';
}

function getProductDisplay(p){
  const variants=p.variants||[];
  if(!variants.length) return {
    price: Number(p.price||0),
    orig: Number(p.original_price||0),
    stock: Number(p.stock||0),
    priceLabel: rupiah(p.price),
    hasVariants: false
  };
  // Ambil varian aktif (stok > 0) untuk harga terendah
  const active=variants.filter(v=>Number(v.stock||0)>0);
  const allPrices=variants.map(v=>Number(v.price||0));
  const minPrice=Math.min(...allPrices);
  const maxPrice=Math.max(...allPrices);
  const totalStock=variants.reduce((a,v)=>a+Number(v.stock||0),0);
  return {
    price: minPrice,
    orig: 0,
    stock: totalStock,
    priceLabel: minPrice===maxPrice ? rupiah(minPrice) : 'Mulai '+rupiah(minPrice),
    hasVariants: true,
    variantCount: variants.length,
    active: active.length
  };
}
function renderSkeletons(n=4){
  return`<div style="display:flex;gap:10px;overflow-x:auto;padding:0 16px;scrollbar-width:none">${Array(n).fill(0).map(()=>`<div class="skeleton-h"><div class="skeleton-img-h"></div><div class="skeleton-body-h"><div class="skeleton-line" style="width:60%"></div><div class="skeleton-line"></div><div class="skeleton-line" style="width:70%"></div></div></div>`).join('')}</div>`;
}

// ── RIPPLE ──
function addRipple(el,e){
  const r=document.createElement('span');
  r.className='ripple-el';
  const rect=el.getBoundingClientRect();
  r.style.left=(e.clientX-rect.left)+'px';
  r.style.top=(e.clientY-rect.top)+'px';
  el.classList.add('ripple-wrap');
  el.appendChild(r);
  setTimeout(()=>r.remove(),520);
}
document.addEventListener('click',e=>{
  const t=e.target.closest('.product-card-h,.product-card-v,.btn-buy,.btn-wa,.btn-add-detail,.nav-item,.cat-tab');
  if(t)addRipple(t,e);
},{passive:true});

function buildPages(){
  const cats=[{id:'all',name:'Semua',icon_url:''},...state.categories];
  $('#catTabs').innerHTML=cats.map((c,i)=>`
    <button class="cat-tab${i===0?' active':''}" onclick="goToPage(${i})">
      <div class="cat-icon">${c.icon_url?`<img src="${c.icon_url}" alt="${c.name}">`:(c.id==='all'?'🏠':c.name.charAt(0))}</div>
      ${c.name}
    </button>`).join('');

  // Pages track untuk slide
  const track=$('#pagesTrack');
  track.innerHTML=cats.map((c)=>`
    <div class="page-slide" id="page-${c.id}">
      <div id="grid-${c.id}">${renderSkeletons()}</div>
    </div>`).join('');

  setTimeout(()=>{
    cats.forEach(c=>{
      const g=$(`#grid-${c.id}`);
      if(g)g.innerHTML=renderPageContent(c.id);
    });
  },50);
}

function goToPage(idx){
  state.currentPage=idx;
  const cats=[{id:'all'},...state.categories];
  // Slide transition
  const track=$('#pagesTrack');
  if(track)track.style.transform=`translateX(-${idx*100}%)`;
  $$('.cat-tab').forEach((t,i)=>{
    t.classList.toggle('active',i===idx);
    if(i===idx)t.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  });
}

// Swipe kategori
let tx=0,ty=0;
document.addEventListener('touchstart',e=>{
  if(e.target.closest('#mainSlider'))return;
  tx=e.touches[0].clientX;ty=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchend',e=>{
  if(e.target.closest('#mainSlider'))return;
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>70&&Math.abs(dx)>Math.abs(dy)*1.5){
    const total=state.categories.length+1;
    if(dx<0&&state.currentPage<total-1)goToPage(state.currentPage+1);
    if(dx>0&&state.currentPage>0)goToPage(state.currentPage-1);
  }
},{passive:true});

function closeDetail(){
  $('#detailOverlay').classList.remove('active');
  // Reset URL
  const url=new URL(window.location.href);
  url.searchParams.delete('produk');
  history.replaceState(null,'',url.toString());

// ── REVIEWS ──
let currentRating = 0;

window.setRating = (productId, val) => {
  currentRating = val;
  $$(`#starPicker-${productId} .star-btn`).forEach(btn => {
    btn.classList.toggle('active', Number(btn.dataset.val) <= val);
  });
};

async function loadReviews(productId) {
  try {
    const data = await api('/api/products/'+productId+'/reviews');
    const listEl = $(`#reviewList-${productId}`);
    const avgEl = $(`#reviewAvg-${productId}`);
    if(!listEl) return;
    if(data.avg && data.total) {
      avgEl.innerHTML = `
        <span class="review-avg-score">${data.avg}</span>
        <span class="review-avg-stars">${'⭐'.repeat(Math.round(data.avg))}</span>
        <span class="review-avg-count">(${data.total})</span>`;
    }
    if(!data.reviews.length) {
      listEl.innerHTML='<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Belum ada ulasan</div>';
      return;
    }
    listEl.innerHTML = data.reviews.map(r=>{
      const rr=Math.max(0,Math.min(5,Number(r.rating)||0));
      return `
      <div class="review-item">
        <div class="review-name">${esc(r.name)}</div>
        <div class="review-stars">${'⭐'.repeat(rr)}${'☆'.repeat(5-rr)}</div>
        ${r.comment?`<div class="review-comment">${esc(r.comment)}</div>`:''}
        <div class="review-date">${new Date(r.created_at).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}</div>
      </div>`;}).join('');
  } catch(e) {
    const listEl = $(`#reviewList-${productId}`);
    if(listEl) listEl.innerHTML='';
  }
}

window.submitReview = async productId => {
  const name = $(`#reviewName-${productId}`)?.value.trim();
  const comment = $(`#reviewComment-${productId}`)?.value.trim();
  if(!name) return flash('❌ Nama wajib diisi');
  if(!currentRating) return flash('❌ Pilih bintang dulu');
  try {
    await api('/api/products/'+productId+'/reviews', {
      method: 'POST',
      body: JSON.stringify({name, rating: currentRating, comment})
    });
    flash('✅ Ulasan terkirim, menunggu persetujuan admin');
    if($(`#reviewName-${productId}`)) $(`#reviewName-${productId}`).value = '';
    if($(`#reviewComment-${productId}`)) $(`#reviewComment-${productId}`).value = '';
    currentRating = 0;
    $$(`#starPicker-${productId} .star-btn`).forEach(b => b.classList.remove('active'));
  } catch(e) { flash('❌ '+e.message); }
};
let selectedVariant = null;

window.selectVariant = el => {
  $$('.variant-option').forEach(v => {
    v.classList.remove('selected');
    v.style.borderColor = 'var(--border)';
    v.style.background = 'var(--bg3)';
  });
  el.classList.add('selected');
  el.style.borderColor = 'var(--accent)';
  el.style.background = 'rgba(192,132,252,0.08)';
  const vPrice = Number(el.dataset.price);
  const vStock = Number(el.dataset.stock);
  selectedVariant = { id: Number(el.dataset.id), name: el.dataset.name, price: vPrice, stock: vStock };
  // Update tampilan harga dan stok
  const priceEl = $('#detailPrice');
  const stokEl = $('#detailStok');
  const addBtn = $('#detailAddBtn');
  const buyBtn = $('#detailBuyBtn');
  if(priceEl) priceEl.textContent = rupiah(vPrice);
  if(stokEl) {
    stokEl.textContent = vStock<=0?'Habis':vStock<=3?`Tipis (${vStock})`:'Ready';
    stokEl.style.color = vStock<=0?'#f87171':vStock<=3?'#fbbf24':'#4ade80';
  }
  if(addBtn) addBtn.disabled = vStock<=0;
  if(buyBtn) { buyBtn.disabled = vStock<=0; buyBtn.style.opacity = vStock<=0?'0.4':'1'; }
};

window.addToCartFromDetail = id => {
  const p = state.products.find(x=>x.id===id); if(!p) return;
  const variants = p.variants||[];
  if(variants.length && selectedVariant) {
    const cartItem = {
      key: cartKey(p.id, selectedVariant.id),
      id: p.id,
      variantId: selectedVariant.id,
      name: p.name + ' — ' + selectedVariant.name,
      price: selectedVariant.price,
      qty: 1,
      image: p.thumbnail||p.image,
      stock: selectedVariant.stock
    };
    if(selectedVariant.stock<1) return flash('❌ Stok varian habis');
    const found = state.cart.find(x=>x.key===cartItem.key);
    if(found){if(found.qty+1>selectedVariant.stock)return flash('❌ Melebihi stok');found.qty++;}
    else state.cart.push(cartItem);
    saveCart();updateCartUI();
    flash('✅ '+cartItem.name+' ditambahkan');
  } else {
    addToCart(p);
  }
};

window.buyNowFromDetail = id => {
  const p = state.products.find(x=>x.id===id); if(!p) return;
  const variants = p.variants||[];
  let items;
  if(variants.length && selectedVariant) {
    if(selectedVariant.stock<1) return flash('❌ Stok varian habis');
    items = [{id:p.id,name:p.name+' — '+selectedVariant.name,price:selectedVariant.price,qty:1}];
  } else {
    if(Number(p.stock||0)<1) return flash('❌ Stok habis');
    items = [{id:p.id,name:p.name,price:Number(p.price),qty:1}];
  }
  api('/api/build-whatsapp-link',{method:'POST',body:JSON.stringify({items})})
    .then(r=>{
      api('/api/track-order',{method:'POST',body:JSON.stringify({items})}).catch(()=>{});
      const w=window.open(r.waLink,'_blank','noopener'); if(!w)flash('Izinkan popup'); closeDetail();
    })
    .catch(()=>flash('Gagal membuat link WA'));
};

window.shareProduct=id=>{
  const p=state.products.find(x=>x.id===id);if(!p)return;
  const shareUrl=window.location.origin+window.location.pathname+'?produk='+id;
  if(navigator.share)navigator.share({title:p.name,text:(p.summary||p.name)+' — '+rupiah(p.price),url:shareUrl});
  else if(navigator.clipboard){navigator.clipboard.writeText(shareUrl);flash('🔗 Link disalin!');}
};

window.addEventListener('scroll',()=>$('#scrollTop').classList.toggle('visible',window.scrollY>400),{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCart();closeDetail();closeSearch();closePromo();}});
function scrollToTop(){window.scrollTo({top:0,behavior:'smooth'});}

function applyBranding(cfg){
  if(!cfg)return;
  document.title=cfg.storeName||'Cellyn Store';
  if(cfg.storeName)$('#headerStoreName').textContent=cfg.storeName;
  if(cfg.heroTitle){
    $('#heroTitle').innerHTML=cfg.heroTitle+'';
  }
  // Marquee dari tagline (sekali saja)
  const mText=cfg.tagline||'';
  if(mText){
    const txt='✦ '+mText+'  ✦  '+mText+'  ';
    $('#marqueeText1').textContent=txt;
    $('#marqueeText2').textContent=txt;
    $('#marqueeWrap').classList.add('visible');
  }
  if(cfg.logoPath)$('#headerLogo').innerHTML=`<img src="${esc(cfg.logoPath)}" alt="Logo">`;
  if(cfg.primaryColor){
    document.documentElement.style.setProperty('--accent',cfg.primaryColor);
    document.documentElement.style.setProperty('--accent2',cfg.primaryColor);
  }
  if(cfg.heroSubtitle){
    const el=$('#heroSubText');
    if(el){el.textContent=cfg.heroSubtitle;el.style.display='block';}
  }
  if(cfg.fontFamily)document.body.style.fontFamily=`'${cfg.fontFamily}',sans-serif`;
  if(cfg.qrisImagePath){$('#qrisImg').src=cfg.qrisImagePath;$('#qrisWrap').style.display='block';}
  if(cfg.footerText){
    $('#footerText').textContent=cfg.footerText;
    $('#siteFooter').style.display='block';
  }
}

async function init(){
  loadCart();updateCartUI();
  try{
    const data=await api('/api/storefront');
    state.products=data.products||[];
    state.categories=data.categories||[];
    state.banners=data.banners||[];
    const s=data.store||{};
    state.config={
      storeName:s.name,tagline:s.tagline,heroPill:s.hero_pill,
      heroTitle:s.hero_title,heroSubtitle:s.hero_subtitle,
      heroDesc:s.hero_desc||s.tagline,
      footerText:s.footer_text,logoPath:s.logo_path,bannerPath:s.banner_path,
      primaryColor:s.primary_color,bgColor:s.bg_color,fontFamily:s.font_family,
      qrisImagePath:s.qris_image_path,discordUrl:s.discord_url,
      whatsappNumber:s.whatsapp_number,waTemplate:s.wa_template
    };
    // Update nama di loader sebelum fade out
    if(s.name)$('#loaderBrand').textContent=s.name.toUpperCase();
    applyBranding(state.config);
    // Notifikasi popup
    const notifs=data.notifications||[];
    const unread=notifs.filter(n=>!n.is_read);
    if(unread.length){
      const n=unread[0];
      $('#notifTitle').textContent=n.title||'';
      $('#notifMsg').textContent=n.message||'';
      $('#notifPopup').style.display='block';
    }
    initSlider(state.banners);
    buildPages();
    // Auto open produk dari URL ?produk=ID
    const urlParams=new URLSearchParams(window.location.search);
    const produkId=urlParams.get('produk');
    if(produkId){setTimeout(()=>openDetail(Number(produkId)),400);}
    // Fade out loading
    setTimeout(()=>{
      const loader=$('#pageLoading');
      loader.classList.add('fade-out');
      setTimeout(()=>loader.style.display='none',500);
    },300);
  }catch(e){
    console.error('Init error:',e);
    // Tetap hide loader walau error
    const loader=$('#pageLoading');
    loader.classList.add('fade-out');
    setTimeout(()=>loader.style.display='none',500);
  }
}
init();
</script>
